<meta name="apple-mobile-web-app-title" content="무음카메라">
<meta name="theme-color" content="#0a0e16">
<style>
  :root{
    --bg:#000; --txt:#f2f3f5; --dim:#8b9099;
    --yellow:#FFCC00; --red:#FF3B30; --green:#34c759;
    --ease-spring:cubic-bezier(.32,.72,0,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;color:var(--txt);user-select:none;-webkit-user-select:none;position:fixed;inset:0;}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  #stage{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;}
  #glpreview{position:absolute;inset:0;width:100%;height:100%;display:none;background:#000;z-index:1;opacity:0;transition:opacity .25s ease;}
  #glpreview.on{display:block;}
  #glpreview.ready{opacity:1;}
  #preview{width:100%;height:100%;object-fit:cover;display:block;background:#000;opacity:0;transition:opacity .25s ease;transform-origin:center center;filter:brightness(var(--ev-b,1)) contrast(var(--ev-c,1)) brightness(var(--st-b,1)) saturate(var(--st-s,1)) contrast(var(--st-c,1)) sepia(var(--st-sp,0)) hue-rotate(var(--st-hr,0deg));}
  #preview.ready{opacity:1;}
  /* 3x3 격자 */
  #grid{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity .25s;}
  #grid.on{opacity:1;}
  #grid i{position:absolute;background:rgba(255,255,255,.28);}
  #grid i.v1{left:33.33%;top:0;bottom:0;width:1px;} #grid i.v2{left:66.66%;top:0;bottom:0;width:1px;}
  #grid i.h1{top:33.33%;left:0;right:0;height:1px;} #grid i.h2{top:66.66%;left:0;right:0;height:1px;}
  /* 탭 포커스 사각형 */
  #focus{position:absolute;z-index:7;width:75px;height:75px;margin:-37px 0 0 -37px;border:1px solid var(--yellow);border-radius:3px;pointer-events:none;display:none;box-shadow:0 0 0 .5px rgba(0,0,0,.3);}
  #focus.show{display:block;animation:focusIn .3s cubic-bezier(0,0,.58,1),focusPulse .4s .3s cubic-bezier(.42,0,.58,1);}
  @keyframes focusIn{from{transform:scale(1.5);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes focusPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
  #focus.fade{opacity:.35;transition:opacity .6s;}
  #focusMsg{position:absolute;z-index:8;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 230px);font-size:11px;color:#fff;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:12px;opacity:0;transition:opacity .2s;pointer-events:none;}
  #focusMsg.on{opacity:1;}
  /* 노출 태양 슬라이더 */
  #sun{position:absolute;z-index:8;width:36px;height:150px;margin-top:-75px;display:none;flex-direction:column;align-items:center;pointer-events:auto;}
  #sun.show{display:flex;}
  #sun .track{position:absolute;top:14px;bottom:14px;width:2px;background:rgba(255,204,0,.4);}
  #sun .knob{position:absolute;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:var(--yellow);filter:drop-shadow(0 1px 3px rgba(0,0,0,.6));cursor:grab;touch-action:none;}
  #sun .knob svg{width:24px;height:24px;}
  #evVal{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;color:var(--yellow);white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.7);display:none;}
  #sun.evon #evVal{display:block;}
  #timerBtn.on,#ratioBtn.on{color:var(--yellow);border-color:rgba(255,204,0,.4) !important;}
  #countdown{position:absolute;inset:0;z-index:9;display:none;align-items:center;justify-content:center;pointer-events:none;}
  #countdown.on{display:flex;}
  #countdown span{font-size:120px;font-weight:200;color:#fff;text-shadow:0 2px 24px rgba(0,0,0,.6);animation:countPop .9s ease-out;}
  @keyframes countPop{0%{transform:scale(1.4);opacity:.2}30%{opacity:1}100%{transform:scale(1);opacity:.85}}
  #canvas{display:none;}

  #top{position:absolute;top:0;left:0;right:0;z-index:5;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);}
  .readout{font-size:11px;letter-spacing:.06em;color:var(--yellow);display:flex;align-items:center;gap:7px;pointer-events:none;}
  .readout .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
  #micBtn{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.04em;color:var(--dim);background:rgba(30,30,30,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:7px 11px;cursor:pointer;}
  #micBtn svg{width:15px;height:15px;}
  #micBtn.on,#gridBtn.on{color:var(--yellow);border-color:rgba(255,204,0,.4) !important;}

  #recBadge{position:absolute;top:calc(env(safe-area-inset-top) + 56px);left:50%;transform:translateX(-50%);z-index:6;display:none;align-items:center;gap:8px;padding:7px 14px;border-radius:30px;background:rgba(0,0,0,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-size:13px;font-weight:700;letter-spacing:.05em;}
  #recBadge.on{display:flex;}
  #recBadge .pulse{width:9px;height:9px;border-radius:50%;background:var(--red);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:6;}
  #flash.fire{animation:flash .32s ease-out;}
  @keyframes flash{0%{opacity:0}10%{opacity:.6}100%{opacity:0}}

  /* zoom pills */
  #zoomBar{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 150px);z-index:5;display:flex;justify-content:center;gap:10px;transition:opacity .2s;}
  #zoomBar.hide{opacity:0;pointer-events:none;}
  .zpill{min-width:34px;height:34px;padding:0 8px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.4);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;font-size:12px;font-weight:600;display:grid;place-items:center;cursor:pointer;transition:.18s;}
  .zpill.sel{background:rgba(0,0,0,.6);color:var(--yellow);transform:scale(1.08);min-width:44px;border-radius:22px;}
  #zoomLive{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 194px);z-index:6;font-size:13px;font-weight:700;color:var(--yellow);background:rgba(0,0,0,.5);padding:4px 12px;border-radius:20px;display:none;}
  #zoomLive.on{display:block;}

  // ---------- 상태 ----------

  const items=[];
  let viewIndex=-1;

  // 줌
  let zoom=1; const ZMIN=0.5, ZMAX=3;

  // 녹화
  let recorder=null, recChunks=[], recTimer=null, recStart=0, recording=false;
  let capturing=false;   // 사진 캡처/후처리 진행 중 플래그
  const MAX_REC_MS=10*60*1000;

  const RES_LADDER=[
    {width:{ideal:4096},height:{ideal:2304}},
    {width:{ideal:3840},height:{ideal:2160}},
    {width:{ideal:1920},height:{ideal:1080}},
    {width:{ideal:1280},height:{ideal:720}},

  // 동영상: 4K 한 단계 아래(1080p) + 프레임 최대(60fps 시도)
  const VIDEO_LADDER=[
    {width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:60}},
    {width:{ideal:1920},height:{ideal:1080}},
    {width:{ideal:1280},height:{ideal:720},frameRate:{ideal:60}},
    {width:{ideal:1280},height:{ideal:720}},
    {}
  ];

  // ---------- IndexedDB ----------
  let _db=null;
  function openDB(){
    if(_db) return Promise.resolve(_db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open("silentcam",2);
      r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("photos")) r.result.createObjectStore("photos",{keyPath:"id"}); };
      r.onsuccess=()=>{ _db=r.result; res(_db); };
      r.onerror=()=>rej(r.error);
    });
  }

  function getAll(db){ return new Promise((res,rej)=>{ const out=[]; const req=db.transaction("photos").objectStore("photos").openCursor(); req.onsuccess=e=>{const c=e.target.result; if(c){out.push(c.value);c.continue();}else res(out);}; req.onerror=()=>rej(req.error); }); }
  async function dbPut(rec){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").put(rec); await txDone(tx); }
  async function dbDelete(id){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").delete(id); await txDone(tx); }
  async function dbMarkSaved(id,savedAt){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); const st=tx.objectStore("photos"); const rec=await reqProm(st.get(id)); if(rec){rec.saved=true;rec.savedAt=savedAt;st.put(rec);} await txDone(tx); }

  // 해상도 사다리로 스트림 확보 (옛 스트림은 건드리지 않음)
  async function getStream(withAudio){
    let lastErr=null;
    const ladder = (mode==="video") ? VIDEO_LADDER : RES_LADDER;
    for(const res of ladder){
      try{
        return await navigator.mediaDevices.getUserMedia({audio:withAudio?true:false,video:{facingMode:{ideal:facing},...res}});
      }catch(e){
        lastErr=e;
        if(withAudio && (e.name==="NotAllowedError"||e.name==="NotFoundError")){
          try{ return await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:facing},...res}}); }catch(_){}
        }
        if(e.name==="NotAllowedError"||e.name==="NotFoundError") throw e;
      }
    }
    throw lastErr||new Error("unknown");
  }

    if(acquiring) return stream;            // 동시 호출 차단 (이중 깜빡임 방지)
    acquiring=true;
    try{
      const newStream = await getStream(withAudio);
      const old = stream;
      stream = newStream; videoTrack = newStream.getVideoTracks()[0];
      probeCaps();
      attachPreview(newStream); updateRes();
      if(old){ try{ old.getTracks().forEach(t=>t.stop()); }catch(_){} }
      lastAcquire = Date.now();
      return newStream;
    } finally { acquiring=false; }
  }

    zoomCaps = caps.zoom && (caps.zoom.max>caps.zoom.min) ? caps.zoom : null;
    hwZoom = !!zoomCaps;
    focusCaps = { poi: !!caps.pointsOfInterest, modes: caps.focusMode||[] };
    torchCap = !!caps.torch;            // iOS 17.4+ 후면 LED
    torchOn=false;

    if(ratio==="4:3"){ const cw=Math.round(h*4/3); return [Math.min(cw,w),h]; }
    if(ratio==="1:1"){ const s=Math.min(w,h); return [s,s]; }

  const ptrs=new Map(); let pinchStartDist=0, pinchStartZoom=1;

  async function tryRealFocus(nx,ny){
    if(!videoTrack || !videoTrack.applyConstraints) return false;

    const adv={};
    if(focusCaps.poi) adv.pointsOfInterest=[{x:nx,y:ny}];

  function focusTap(clientX, clientY){

  // ---------- 사진 (줌 크롭 반영) ----------
  // ===== 연구3 화질 보정 파이프라인 (사진 후처리, 적당 강도) =====
  const ENH = {
    shadowLift: 0.22,   // 섀도우/미드 올리기
    highComp:   0.10,   // 하이라이트 누르기
    sat:        1.12,   // 채도
    warmR:      1.030,  // 따뜻한 화이트밸런스
    warmB:      0.972,
    noiseThr:   10,     // 이 이하 차이는 노이즈로 간주(0~255)
    denoise:    0.55,   // 평탄부 평활 강도
    sharpen:    0.70    // 엣지 선명도
  };
  // 1) 점연산: 톤매핑 + 색감(채도/온도)
  function tonalColorPass(d){
    const {shadowLift:SL, highComp:HC, sat:SAT, warmR, warmB}=ENH;
    for(let i=0;i<d.length;i+=4){
      let r=d[i]/255, g=d[i+1]/255, b=d[i+2]/255;
      // 톤매핑(채널별 게인 곡선)
      r = r + SL*(1-r)*r - HC*r*r;
      g = g + SL*(1-g)*g - HC*g*g;
      b = b + SL*(1-b)*b - HC*b*b;
      // 화이트밸런스(따뜻하게)
      r*=warmR; b*=warmB;
      // 채도(루마 기준)
      const lum = 0.299*r + 0.587*g + 0.114*b;
      r = lum + SAT*(r-lum);
      g = lum + SAT*(g-lum);
      b = lum + SAT*(b-lum);
      d[i]  = r<=0?0:r>=1?255:r*255;
      d[i+1]= g<=0?0:g>=1?255:g*255;
      d[i+2]= b<=0?0:b>=1?255:b*255;
    }
  }
  // 2) 이웃연산 1패스: 엣지보존 디노이즈 + 언샵(평탄부=평활, 엣지=선명)
  function denoiseSharpenPass(s,o,w,h){
    const {noiseThr:THR, denoise:DEN, sharpen:SH}=ENH;
    for(let y=0;y<h;y++){
      const y0=y>0?y-1:0, y1=y<h-1?y+1:h-1;
      const r0=y0*w*4, r1=y*w*4, r2=y1*w*4;
      for(let x=0;x<w;x++){
        const x0=(x>0?x-1:0)*4, xc=x*4, x1=(x<w-1?x+1:w-1)*4;
        const i=(y*w+x)*4;
        for(let c=0;c<3;c++){
          const mean=(
            s[r0+x0+c]+s[r0+xc+c]+s[r0+x1+c]+
            s[r1+x0+c]+s[r1+xc+c]+s[r1+x1+c]+
            s[r2+x0+c]+s[r2+xc+c]+s[r2+x1+c]
          )/9;
          const px=s[i+c], diff=px-mean;
          const base = (Math.abs(diff)<THR) ? (px - diff*DEN) : px;  // 평탄부만 평활
          let v = base + SH*(base-mean);                            // 엣지 선명
          o[i+c]=v<0?0:v>255?255:v;
        }
        o[i+3]=s[i+3];
      }
    }
  }
  // ===== 연구4: 카메라 색감 오마주 프리셋 (상표 피해 자체 명칭 사용) =====
  // 'std'  = 표준 (연구3 기본 보정)
  // 'warm' = 화사 인물 (캐논 오마주: 따뜻한 WB, 살구톤 화사)
  // 'classic' = 클래식 (라이카 오마주: 농밀 채도, 섀도우 청록, 하이라이트 웜)
  // 'press'   = 필름 보도 (니콘 D3 오마주: 강한 채도, 옐로우 캐스트, 핑크 피부)
  // ===== 연구 기반 색감 프리셋 v2 =====
  // 핵심: 전역 워밍이 아니라 (1)톤곡선 S자+롤오프 (2)3x3 휴매트릭스(빠름) (3)YCbCr 피부마스크 국소보정
  const STYLE_PARAMS = {
    warm: {    // 화사 인물 (캐논 인물): 피부만 레드→오렌지·마젠타 제거·명도↑·채도 절제
      gain:[1.035,1.00,0.975], lift:0.016, gamma:1.0, shoulder:0.12, sat:1.03, hueDeg:0,
      skin:{warm:7, lum:1.06, sat:0.90}, shadowTint:[1,1,0], highlightTint:[3,2,-2]
    },
    classic: { // 클래식 (라이카): 고콘트라스트·섀도우 크러시·따뜻한 하이라이트·풍부한 채도
      gain:[1.03,1.00,0.985], lift:-0.03, gamma:0.96, shoulder:0.14, sat:1.10, hueDeg:-3,
      skin:{warm:3, lum:1.02, sat:0.98}, shadowTint:[-3,-1,4], highlightTint:[5,3,-3]
    },
    press: {   // 필름 보도 (니콘 D3/Classic Chrome): 낮은 채도·묵직한 톤·마젠타 절제

      skin:{warm:4, lum:1.02, sat:0.90}, shadowTint:[1,3,2], highlightTint:[3,3,-3]

  // 256엔트리 톤곡선 (lift<0=섀도우 크러시, shoulder=하이라이트 롤오프)
  function buildToneLUT(lift, gamma, shoulder){
    const lut=new Uint8ClampedArray(256);
    for(let i=0;i<256;i++){
      let x=i/255;
      x = lift + (1-lift)*x;
      x = Math.pow(Math.max(0,x), 1/gamma);
      if(shoulder>0 && x>1-shoulder){
        const t=(x-(1-shoulder))/shoulder;
        x=(1-shoulder)+shoulder*(1-Math.exp(-t));
      }
      lut[i] = x<=0?0 : x>=1?255 : Math.round(x*255);
    }
    return lut;
  }
  // luminance 보존 휴 회전 3x3 매트릭스 (Rec.709) — 픽셀당 곱셈 9번, rgb2hsl 불필요
  function buildHueMatrix(deg){
    const t=deg*Math.PI/180, c=Math.cos(t), s=Math.sin(t);

    return [
      lR+c*(1-lR)+s*(-lR),  lG+c*(-lG)+s*(-lG),   lB+c*(-lB)+s*(1-lB),
      lR+c*(-lR)+s*(0.143), lG+c*(1-lG)+s*(0.140),lB+c*(-lB)+s*(-0.283),
      lR+c*(-lR)+s*(-(1-lR)),lG+c*(-lG)+s*(lG),   lB+c*(1-lB)+s*(lB)
    ];
  }
  // 연구 기반 applyStyle: 게인→톤LUT→휴매트릭스→전역채도→YCbCr 피부 국소보정→스플릿토닝
  function applyStyle(ctx,w,h,name){
    const p=STYLE_PARAMS[name]; if(!p) return;

      const lut=buildToneLUT(p.lift,p.gamma,p.shoulder);

      const sk=p.skin||{warm:0,lum:1,sat:1};
      const sh=p.shadowTint||[0,0,0], hi=p.highlightTint||[0,0,0];
      const id=ctx.getImageData(0,0,w,h); const d=id.data;
      for(let i=0;i<d.length;i+=4){
        // 1) 채널 게인 + 톤곡선
        let r=d[i]*gR; if(r>255)r=255; let g=d[i+1]*gG; if(g>255)g=255; let b=d[i+2]*gB; if(b>255)b=255;
        r=lut[r|0]; g=lut[g|0]; b=lut[b|0];
        // 2) 휴 회전(전역, 매트릭스)
        if(p.hueDeg){ const R=r,G=g,B=b; r=m0*R+m1*G+m2*B; g=m3*R+m4*G+m5*B; b=m6*R+m7*G+m8*B; }

        let L=0.299*r+0.587*g+0.114*b;

        if(r<0)r=0;else if(r>255)r=255; if(g<0)g=0;else if(g>255)g=255; if(b<0)b=0;else if(b>255)b=255;
        // 4) YCbCr 피부 마스크 → 국소 보정 (피부만)
        const Cb=-0.168736*r-0.331264*g+0.5*b+128;
        const Cr= 0.5*r-0.418688*g-0.081312*b+128;
        if(Cb>=77&&Cb<=127&&Cr>=133&&Cr<=173&&L>40){
          // 중심(102,153)에서의 거리로 소프트 가중치
          const dc=(Cb-102)/25, dr=(Cr-153)/20;
          let wts=1-(dc*dc+dr*dr); if(wts<0)wts=0;       // 0~1

            // 레드→오렌지 + 마젠타 제거: G 살짝↑, B 살짝↓
            g += sk.warm*wts; b -= sk.warm*0.5*wts;
            // 명도 부스트
            const fl=1+(sk.lum-1)*wts; r*=fl; g*=fl; b*=fl;
            // 피부 채도 절제(루마로 끌어당김)
            const Ls=0.299*r+0.587*g+0.114*b, ss=1-(1-sk.sat)*wts;

          }
        }
        // 5) 섀도우/하이라이트 틴팅
        const Ln=L/255, wsh=(1-Ln)*(1-Ln), whi=Ln*Ln;
        r+=sh[0]*wsh+hi[0]*whi; g+=sh[1]*wsh+hi[1]*whi; b+=sh[2]*wsh+hi[2]*whi;
        d[i]=r<=0?0:r>=255?255:r; d[i+1]=g<=0?0:g>=255?255:g; d[i+2]=b<=0?0:b>=255?255:b;
      }
      ctx.putImageData(id,0,0);
    }catch(_){}
  }

  // ===== WebGL 프리뷰: 색감을 3D LUT으로 구워 셰이더로 실시간 적용 (실패 시 2D 폴백) =====
  function clamp255(v){ return v<=0?0:v>=255?255:v; }
  // 순수 픽셀 함수 (LUT 굽기용) — applyStyle/tonalColorPass와 동일 수식
  function lookPixel(name,r,g,b){
    if(name==="std"){
      const SL=ENH.shadowLift,HC=ENH.highComp,SAT=ENH.sat,wR=ENH.warmR,wB=ENH.warmB;
      let R=r/255,G=g/255,B=b/255;
      R=R+SL*(1-R)*R-HC*R*R; G=G+SL*(1-G)*G-HC*G*G; B=B+SL*(1-B)*B-HC*B*B;
      R*=wR; B*=wB;
      const lum=0.299*R+0.587*G+0.114*B;
      R=lum+SAT*(R-lum); G=lum+SAT*(G-lum); B=lum+SAT*(B-lum);
      return [clamp255(R*255),clamp255(G*255),clamp255(B*255)];
    }
    const p=STYLE_PARAMS[name]; if(!p) return [r,g,b];
    if(!p._lut) p._lut=buildToneLUT(p.lift,p.gamma,p.shoulder);
    if(!p._m)   p._m=buildHueMatrix(p.hueDeg||0);
    const lut=p._lut,m=p._m,gR=p.gain[0],gG=p.gain[1],gB=p.gain[2],sat=p.sat;
    const sk=p.skin||{warm:0,lum:1,sat:1}, sh=p.shadowTint||[0,0,0], hi=p.highlightTint||[0,0,0];
    let R=r*gR; if(R>255)R=255; let G=g*gG; if(G>255)G=255; let B=b*gB; if(B>255)B=255;
    R=lut[R|0]; G=lut[G|0]; B=lut[B|0];
    if(p.hueDeg){ const rr=R,gg=G,bb=B; R=m[0]*rr+m[1]*gg+m[2]*bb; G=m[3]*rr+m[4]*gg+m[5]*bb; B=m[6]*rr+m[7]*gg+m[8]*bb; }
    let L=0.299*R+0.587*G+0.114*B;
    R=L+sat*(R-L); G=L+sat*(G-L); B=L+sat*(B-L);
    if(R<0)R=0;else if(R>255)R=255; if(G<0)G=0;else if(G>255)G=255; if(B<0)B=0;else if(B>255)B=255;
    const Cb=-0.168736*R-0.331264*G+0.5*B+128, Cr=0.5*R-0.418688*G-0.081312*B+128;
    if(Cb>=77&&Cb<=127&&Cr>=133&&Cr<=173&&L>40){
      const dc=(Cb-102)/25, dr=(Cr-153)/20; let wts=1-(dc*dc+dr*dr); if(wts<0)wts=0;
      if(wts>0){
        G+=sk.warm*wts; B-=sk.warm*0.5*wts;
        const fl=1+(sk.lum-1)*wts; R*=fl;G*=fl;B*=fl;
        const Ls=0.299*R+0.587*G+0.114*B, ss=1-(1-sk.sat)*wts;
        R=Ls+ss*(R-Ls); G=Ls+ss*(G-Ls); B=Ls+ss*(B-Ls);
      }
    }
    const Ln=L/255, wsh=(1-Ln)*(1-Ln), whi=Ln*Ln;
    R+=sh[0]*wsh+hi[0]*whi; G+=sh[1]*wsh+hi[1]*whi; B+=sh[2]*wsh+hi[2]*whi;
    return [clamp255(R),clamp255(G),clamp255(B)];
  }
  // 32^3 LUT을 1024x32 스트립 ImageData로 굽기 (캐시)
  const LUT_SIZE=32, lutCache={};
  function buildLUT(name){
    if(lutCache[name]) return lutCache[name];
    const N=LUT_SIZE, W=N*N, H=N;
    const id=new ImageData(W,H);
    const d=id.data;
    for(let zb=0; zb<N; zb++){
      const bIn=zb/(N-1)*255;
      for(let yg=0; yg<N; yg++){
        const gIn=yg/(N-1)*255;
        const row=yg*W;
        for(let xr=0; xr<N; xr++){
          const rIn=xr/(N-1)*255;
          const out=lookPixel(name,rIn,gIn,bIn);
          const idx=(row + zb*N + xr)*4;
          d[idx]=out[0]; d[idx+1]=out[1]; d[idx+2]=out[2]; d[idx+3]=255;
        }
      }
    }
    lutCache[name]=id; return id;
  }

  const GL = { ok:false, running:false, gl:null, vidTex:null, lutTex:null, prog:null, u:{}, lastVW:0, lastVH:0, curLut:null };
  const glCanvas=$("#glpreview");

    "precision mediump float;varying vec2 vUv;",
    "uniform sampler2D uVideo;uniform sampler2D uLut;",
    "uniform vec2 uScale;uniform float uMirror;uniform float uB;uniform float uC;",
    "const float S=32.0;",
    "vec3 lutApply(vec3 c){",
    " float ss=1.0/S, sp=ss/S, w=S-1.0, inner=sp*w;",
    " float z0=floor(c.b*w), z1=min(z0+1.0,w);",

    " vec2 uv=(vUv-0.5)*uScale+0.5;",
    " if(uMirror>0.5) uv.x=1.0-uv.x;",
    " vec3 c=texture2D(uVideo,uv).rgb;",
    " c=((c-0.5)*uC+0.5)*uB; c=clamp(c,0.0,1.0);",

  function glCompile(gl,type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ return null; } return s; }

      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

  function glUploadLUT(name){
    if(!GL.ok) return;
    const gl=GL.gl, id=buildLUT(name);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,GL.lutTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,false);   // LUT은 뒤집지 않음

  function glResize(){
    if(!GL.ok) return;

    const w=Math.round(stageEl.clientWidth*dpr), h=Math.round(stageEl.clientHeight*dpr);
    if(w&&h&&(glCanvas.width!==w||glCanvas.height!==h)){ glCanvas.width=w; glCanvas.height=h; }
  }
  function glFrame(){
    if(!GL.running||!GL.ok) return;
    const gl=GL.gl;
    if(videoEl.readyState>=2 && videoEl.videoWidth){
      glResize();
      gl.viewport(0,0,glCanvas.width,glCanvas.height);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,GL.vidTex);

        if(GL.lastVW!==videoEl.videoWidth||GL.lastVH!==videoEl.videoHeight){

      const z=usedHw?1:Math.max(1,zoom);

  function glEffStyle(){ return mode==="photo"?style:"std"; }

    scheduleGlFrame();
  }

  function useFallbackPreview(){

  }

  // 표준 보정: 무거운 이웃연산(디노이즈) 제거하고 빠른 점연산만
  function enhancePhoto(ctx,w,h){
    try{
      const img=ctx.getImageData(0,0,w,h);
      tonalColorPass(img.data);                // 톤+색감(빠른 점연산)
      ctx.putImageData(img,0,0);
    }catch(_){}
  }
  function applyExposureCanvas(ctx,w,h,b,c){
    try{
      const id=ctx.getImageData(0,0,w,h); const d=id.data;
      for(let i=0;i<d.length;i+=4){
        for(let k=0;k<3;k++){ let v=d[i+k]/255; v=(v-0.5)*c+0.5; v*=b; d[i+k]=v<=0?0:v>=1?255:v*255; }
      }
      ctx.putImageData(id,0,0);
    }catch(_){}
  }
  function takePhoto(){
    if(capturing) return;
    const vw=videoEl.videoWidth, vh=videoEl.videoHeight;
    if(!vw||!vh) return;
    const z = usedHw ? 1 : Math.max(1, zoom);   // 하드웨어 줌이면 디지털 크롭 안 함
    let sw=vw/z, sh=vh/z;
    // 비율 크롭(가로 센서 기준, 중앙) — 해상도 최대 유지
    const Ar = ratio==="4:3" ? 4/3 : ratio==="1:1" ? 1 : (sw/sh);
    let cw=sw, ch=sh;
    if(sw/sh > Ar) cw=sh*Ar; else ch=sw/Ar;
    const sx=(vw-cw)/2, sy=(vh-ch)/2;   // 중앙 크롭
    canvas.width=Math.round(cw); canvas.height=Math.round(ch);
    const ctx=canvas.getContext("2d");
    const b=1+ev*0.5, c=1+ev*0.12;
    if(ev!==0 && FILTER_SUPPORTED) ctx.filter=`brightness(${b}) contrast(${c})`;
    // 전면(셀카)도 좌우반전 없이 실제 방향으로 저장 (프리뷰만 거울)
    ctx.drawImage(videoEl, sx,sy,cw,ch, 0,0,canvas.width,canvas.height);
    ctx.filter="none";
    flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");
    capturing=true; shutter.classList.add("busy");      // 중복 촬영 방지 + 피드백
    const ow=canvas.width, oh=canvas.height, needEV=(ev!==0 && !FILTER_SUPPORTED);
    setTimeout(()=>{                                   // 플래시 먼저 → 후처리는 다음 틱
      try{
        if(needEV) applyExposureCanvas(ctx,ow,oh,b,c);   // 노출 슬라이더(필터 미지원 시)
        if(style==="std") enhancePhoto(ctx,ow,oh);       // 표준: 빠른 점연산 보정
        else applyStyle(ctx,ow,oh,style);                // 프리셋: 빠른 RGB 색감
      }catch(_){}
      canvas.toBlob(b2=>{
        if(b2) addMedia(b2,"photo","jpg");
        capturing=false; shutter.classList.remove("busy");
      }, "image/jpeg", 0.95);
    },0);
  }

  // ---------- 동영상 (항상 1x 원본) ----------
  function pickMime(){
    const c=["video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/mp4","video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm"];
    for(const m of c){ if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) return m; }
    return "";
  }
  function startRec(){
    if(!stream||recording) return;
    if(!window.MediaRecorder){ alert("이 브라우저는 동영상 녹화를 지원하지 않습니다."); return; }
    const mime=pickMime();
    try{ recorder = mime ? new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:16000000,audioBitsPerSecond:128000}) : new MediaRecorder(stream); }
    catch(e){ try{ recorder=new MediaRecorder(stream);}catch(e2){ alert("녹화를 시작할 수 없습니다."); return; } }
    recChunks=[];
    recorder.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
    recorder.onstop=()=>{
      const type=recorder.mimeType||mime||"video/mp4";
      const ext=type.indexOf("mp4")>=0?"mp4":"webm";
      const blob=new Blob(recChunks,{type}); recChunks=[];
      if(blob.size) addMedia(blob,"video",ext);
    };
    recorder.start(1000); recording=true;
    shutter.classList.add("rec");
    recStart=Date.now(); recBadge.classList.add("on"); tickRec();
    recTimer=setInterval(()=>{ tickRec(); if(Date.now()-recStart>=MAX_REC_MS) stopRec(); },250);
  }
  function tickRec(){ const s=Math.floor((Date.now()-recStart)/1000); recTime.textContent=`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }
  function stopRec(){
    if(!recording) return; recording=false;
    try{ recorder.stop(); }catch(_){}
    clearInterval(recTimer); shutter.classList.remove("rec"); recBadge.classList.remove("on");
  }

  // ---------- 타이머 ----------
  const TIMER_STEPS=[0,3,10];

  const countdownEl=$("#countdown"), countNum=$("#countNum"), timerBtn=$("#timerBtn"), timerLabel=$("#timerLabel");
  function renderTimer(){

    timerBtn.classList.toggle("on", s>0);
  }
  timerBtn.addEventListener("click",()=>{ if(counting) return; timerIdx=(timerIdx+1)%TIMER_STEPS.length; renderTimer(); });
  function startCountdown(cb){
    counting=true; let n=TIMER_STEPS[timerIdx];
    countNum.textContent=n; countdownEl.classList.add("on");
    countNum.style.animation="none"; void countNum.offsetWidth; countNum.style.animation="";
    countTimer=setInterval(()=>{
      n--;
      if(n<=0){ clearInterval(countTimer); countdownEl.classList.remove("on"); counting=false; cb(); }
      else { countNum.textContent=n; countNum.style.animation="none"; void countNum.offsetWidth; countNum.style.animation=""; }
    },1000);
  }
  function cancelCountdown(){ clearInterval(countTimer); counting=false; countdownEl.classList.remove("on"); }

  function doCapture(){ if(mode==="photo") takePhoto(); else startRec(); }
  function onShutter(){
    if(!stream) return;
    if(mode==="video" && recording){ stopRec(); return; }   // 녹화 중지는 즉시
    if(counting){ cancelCountdown(); return; }               // 카운트다운 중 취소
    if(capturing) return;                                    // 사진 처리 중 중복 무시
    if(TIMER_STEPS[timerIdx]>0){ startCountdown(doCapture); }
    else doCapture();
  }

  // ---------- 저장/공유 ----------
  function downloadFallback(it){ const a=document.createElement("a"); a.href=it.url; a.download=it.file.name; document.body.appendChild(a); a.click(); a.remove(); }
  async function markSaved(list){ const now=Date.now(); for(const it of list){ it.saved=true; it.savedAt=now; try{ await dbMarkSaved(it.id,now);}catch(_){} } }
  function saveOne(it){
    if(navigator.canShare && navigator.canShare({files:[it.file]})){
      navigator.share({files:[it.file]}).then(async()=>{ await markSaved([it]); renderGallery(); refreshViewerState(); }).catch(()=>{});

  // ---------- 삭제/정리 ----------

  // ---------- 갤러리 (심플 + 선택 모드 + 탭) ----------
  let selMode=false; const selSet=new Set();

  const galTitle=$("#galTitle"), selToggle=$("#selToggle"), saveAllBig=$("#saveAllBig");
  const selbar=$("#selbar"), selSaveBtn=$("#selSave"), selDelBtn=$("#selDel");
  const gtabs=$("#gtabs"), tabAll=gtabs.querySelector('[data-tab="all"]'), tabUn=gtabs.querySelector('[data-tab="unsaved"]'), tabSv=gtabs.querySelector('[data-tab="saved"]');
  function inTab(it){ return galTab==="all" ? true : (galTab==="saved" ? !!it.saved : !it.saved); }

  function refreshThumb(){
    thumbCnt.textContent=items.length; thumbCnt.classList.toggle("on",items.length>0);
    const empt=thumb.querySelector(".empt");

    else { empt.style.display="block"; thumb.style.backgroundImage="none"; thumb.style.background="#1a1c20"; }
  }
  function updateGalChrome(){

    const unsavedN=total-savedN;
    tabAll.textContent=`전체 ${total}`; tabUn.textContent=`저장 전 ${unsavedN}`; tabSv.textContent=`저장됨 ${savedN}`;

    if(selMode){
      const c=selSet.size;
      galTitle.textContent = c? `${c}개 선택됨` : "항목 선택";

    }else{
      galTitle.textContent = "보관함";

      selToggle.style.visibility = total? "visible":"hidden";
      gtabs.classList.toggle("hide", total===0);

  }
  function renderGallery(){
    if(!items.length){
      ggrid.classList.remove("selmode");
      ggrid.innerHTML='<div class="gempty">아직 촬영한 사진·동영상이 없습니다.</div>';

    }

    items.forEach((it,idx)=>{
      if(!inTab(it)) return;                 // 탭 필터(전체/저장전/저장됨)

      const el=document.createElement("div");
      el.className="gitem"+(it.saved?" saved":"")+(selSet.has(it.id)?" sel":"");

      const vtag=it.kind==="video"?`<span class="vtag"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>VIDEO</span>`:"";
      const check=`<span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></span>`;
      el.innerHTML=`<span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></span>${vtag}${media}${check}<div class="acts"><button data-act="save" data-id="${it.id}">저장</button><button class="del" data-act="del" data-id="${it.id}">삭제</button></div>`;
      ggrid.appendChild(el);
    });
    if(!shown){
      const msg = galTab==="saved" ? "저장한 사진이 없습니다." : galTab==="unsaved" ? "저장 전 사진이 없습니다." : "항목이 없습니다.";
      ggrid.innerHTML=`<div class="gempty">${msg}</div>`;
    }
    updateGalChrome();
  }
  // 탭 전환
  gtabs.addEventListener("click",e=>{
    const b=e.target.closest(".gtab"); if(!b) return;
    if(selMode) exitSel();
    galTab=b.dataset.tab; renderGallery();
  });
  ggrid.addEventListener("click",e=>{
    if(selMode){
      const card=e.target.closest(".gitem"); if(!card) return;
      const id=card.dataset.id;
      if(selSet.has(id)){ selSet.delete(id); card.classList.remove("sel"); }
      else { selSet.add(id); card.classList.add("sel"); }

    }
    const m=e.target.closest("[data-idx]");
    if(m){ openViewer(parseInt(m.dataset.idx,10)); return; }
    const b=e.target.closest("button[data-act]"); if(!b) return;
    const it=items.find(x=>x.id===b.dataset.id); if(!it) return;
    if(b.dataset.act==="save") saveOne(it);
    else if(b.dataset.act==="del"){ if(confirm("삭제할까요?")) deleteItem(it.id); }
  });
  function enterSel(){ selMode=true; selSet.clear(); renderGallery(); }
  function exitSel(){ selMode=false; selSet.clear(); renderGallery(); }
  selToggle.addEventListener("click",()=>{
    if(!selMode){ enterSel(); return; }
    // 선택 모드: 현재 탭의 보이는 항목만 전체 선택/해제
    const vis=items.filter(inTab);

      navigator.share({files}).then(async()=>{ await markSaved(list); exitSel(); }).catch(err=>{ if(err&&err.name!=="AbortError") alert("한 번에 저장이 안 되면 개수를 줄여 보세요."); });
    }else{ list.forEach(downloadFallback); exitSel(); }
  });
  selDelBtn.addEventListener("click",async()=>{
    const list=items.filter(it=>selSet.has(it.id)); if(!list.length) return;
    if(!confirm(`선택한 ${list.length}개를 삭제할까요? (사진첩에 저장한 사진은 그대로 남습니다)`)) return;
    for(const it of list){ URL.revokeObjectURL(it.url); const i=items.indexOf(it); if(i>=0) items.splice(i,1); try{await dbDelete(it.id);}catch(_){} }
    exitSel(); refreshThumb();
  });

  // ---------- 뷰어 (핀치줌·패닝·아래로 닫기·더블탭) ----------
  const vstageEl=$("#vstage");
  let vScale=1, vTx=0, vTy=0;             // 이미지 변환 상태
  function vApply(anim){
    vimg.classList.toggle("notrans", !anim);
    vimg.style.transform=`translate(${vTx}px,${vTy}px) scale(${vScale})`;
    viewer.classList.toggle("zoomed", vScale>1.01);
  }
  function vReset(anim){ vScale=1; vTx=0; vTy=0; vApply(anim); viewer.style.background="#000"; }

  function openViewer(idx){ if(idx<0||idx>=items.length) return; viewIndex=idx; renderViewer(); viewer.classList.add("open"); }
  function renderViewer(){
    const it=items[viewIndex]; if(!it){ closeViewer(); return; }
    try{ vvid.pause(); }catch(_){}
    vReset(false);
    if(it.kind==="photo"){ vimg.src=it.url; vimg.style.display="block"; vvid.style.display="none"; vvid.removeAttribute("src"); }
    else { vvid.src=it.url; vvid.style.display="block"; vimg.style.display="none"; vimg.removeAttribute("src"); }
    vmeta.textContent=`${viewIndex+1} / ${items.length} · ${it.kind==="video"?"동영상":"사진"}${it.saved?" · 저장됨 ✓":""}`;
  }
  function refreshViewerState(){ if(viewer.classList.contains("open")) renderViewer(); }
  function closeViewer(){ try{vvid.pause();}catch(_){} viewer.classList.remove("open","zoomed"); viewer.style.background="#000"; viewIndex=-1; }
  function navTo(i){ if(i<0||i>=items.length) return; viewIndex=i; renderViewer(); }
  $("#vclose").addEventListener("click",closeViewer);
  $("#vprev").addEventListener("click",()=>navTo(viewIndex-1));
  $("#vnext").addEventListener("click",()=>navTo(viewIndex+1));
  $("#vsave").addEventListener("click",()=>{ const it=items[viewIndex]; if(it) saveOne(it); });
  $("#vdel").addEventListener("click",async()=>{
    const it=items[viewIndex]; if(!it) return;
    if(!confirm("삭제할까요?")) return;
    await deleteItem(it.id);
    if(!items.length){ closeViewer(); return; }
    if(viewIndex>=items.length) viewIndex=items.length-1;
    renderViewer();
  });

  // 제스처 상태
  const vptrs=new Map();
  let gMode=null;            // 'pan' | 'pinch' | 'swipe' | 'dismiss'
  let startX=0,startY=0, baseTx=0,baseTy=0, baseScale=1, pinchD0=0, lastTapT=0;
  function ptArr(){ return [...vptrs.values()]; }
  function isPhoto(){ const it=items[viewIndex]; return it && it.kind==="photo"; }

  vstageEl.addEventListener("pointerdown",e=>{
    if(e.target.closest("#vvid")) return;          // 동영상 컨트롤은 그대로
    vptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(vptrs.size===1){
      startX=e.clientX; startY=e.clientY; baseTx=vTx; baseTy=vTy;
      gMode = vScale>1.01 ? 'pan' : null;          // 확대 상태면 패닝, 아니면 미정(스와이프/닫기)
    } else if(vptrs.size===2 && isPhoto()){
      const[a,b]=ptArr(); pinchD0=Math.hypot(a.x-b.x,a.y-b.y); baseScale=vScale; gMode='pinch';
    }
  });
  vstageEl.addEventListener("pointermove",e=>{
    if(!vptrs.has(e.pointerId)) return;
    vptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(gMode==='pinch' && vptrs.size>=2){
      const[a,b]=ptArr(); const d=Math.hypot(a.x-b.x,a.y-b.y);
      vScale=Math.max(1,Math.min(5, baseScale*(d/pinchD0))); vApply(false); return;
    }
    if(vptrs.size!==1) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(gMode==='pan'){ vTx=baseTx+dx; vTy=baseTy+dy; vApply(false); return; }
    if(gMode===null){
      if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>12) gMode='swipe';
      else if(dy>12) gMode='dismiss';
    }
    if(gMode==='dismiss'){
      const prog=Math.min(1,Math.max(0,dy)/300);
      vTy=dy>0?dy:0; vTx=dx*0.3; vScale=1-prog*0.12; vApply(false);
      viewer.style.background=`rgba(0,0,0,${1-prog*0.7})`;
    }
  });
  function vEnd(e){
    const had=vptrs.has(e.pointerId); vptrs.delete(e.pointerId);
    if(!had) return;
    if(gMode==='pinch'){ if(vptrs.size<2){ if(vScale<=1.01) vReset(true); gMode = vScale>1.01?'pan':null; } return; }
    if(vptrs.size>0) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(gMode==='swipe'){
      if(dx>50) navTo(viewIndex-1); else if(dx<-50) navTo(viewIndex+1);
    } else if(gMode==='dismiss'){
      if(dy>120){ closeViewer(); } else { vReset(true); }
    } else if(gMode===null || gMode==='pan'){
      // 더블탭 판정(움직임 거의 없을 때)
      if(Math.abs(dx)<10 && Math.abs(dy)<10){
        const now=Date.now();
        if(now-lastTapT<300 && isPhoto()){

          lastTapT=0;
        } else lastTapT=now;
      } else if(gMode==='pan'){ clampPan(); }
    }
    gMode = vScale>1.01?'pan':null;
  }
  function clampPan(){
    const r=vstageEl.getBoundingClientRect();
    const maxX=(vScale-1)*r.width/2, maxY=(vScale-1)*r.height/2;
    vTx=Math.max(-maxX,Math.min(maxX,vTx)); vTy=Math.max(-maxY,Math.min(maxY,vTy)); vApply(true);
  }
  vstageEl.addEventListener("pointerup",vEnd);
  vstageEl.addEventListener("pointercancel",e=>{ vptrs.delete(e.pointerId); if(vptrs.size===0){ if(vScale<=1.01) vReset(true); gMode=vScale>1.01?'pan':null; } });

  // ---------- 로드 ----------
  async function loadGallery(){
    try{
      const db=await openDB(); const recs=await getAll(db); const now=Date.now();
      recs.sort((a,b)=>b.ts-a.ts);
      for(const r of recs){
        if(r.saved&&r.savedAt&&(now-r.savedAt)>WEEK){ try{await dbDelete(r.id);}catch(_){} continue; }
        const kind=r.kind||"photo"; const ext=r.ext||(kind==="video"?"mp4":"jpg");
        const blob=new Blob([r.bytes],{type:r.type||(kind==="video"?"video/mp4":"image/jpeg")});
        const url=URL.createObjectURL(blob);
        const prefix=kind==="video"?"VID":"IMG";
        const file=new File([blob], `${prefix}_${stamp(r.ts)}.${ext}`, {type:blob.type});
        items.push({id:r.id,url,file,ts:r.ts,kind,ext,saved:!!r.saved,savedAt:r.savedAt||0});
      }
      refreshThumb();
    }catch(e){ console.warn("보관함 로드 실패:",e); }
  }

  // ---------- 이벤트 ----------
  shutter.addEventListener("click",onShutter);
  flip.addEventListener("click",switchCamera);
  document.querySelectorAll(".mode").forEach(m=>m.addEventListener("click",()=>setMode(m.dataset.mode)));
  thumb.addEventListener("click",()=>{ cleanupSaved(false); galTab="all"; renderGallery(); gallery.classList.add("open"); glStop(); });
  function closeGallery(){
    if(selMode) exitSel();
    gallery.style.transition=""; gallery.style.transform="";
    gallery.classList.remove("open");
    if(GL.ok && gate.classList.contains("gone") && !document.hidden) glStart();
  }
  $("#galClose").addEventListener("click",closeGallery);

  // 제스처로 보관함 닫기: 맨 위에서 아래로 당기기 / 좌우 강한 스와이프
  (function(){
    let sx=0, sy=0, drag=null, active=false;   // drag: 'v' | 'h' | 'scroll' | null
    gallery.addEventListener("touchstart",e=>{
      if(selMode || e.touches.length!==1){ active=false; return; }
      const t=e.touches[0]; sx=t.clientX; sy=t.clientY; drag=null; active=true;
      gallery.style.transition="none";
    },{passive:true});
    gallery.addEventListener("touchmove",e=>{
      if(!active) return;
      const t=e.touches[0], dx=t.clientX-sx, dy=t.clientY-sy;
      if(drag===null){
        if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>12) drag="h";
        else if(dy>12 && ggrid.scrollTop<=0) drag="v";     // 맨 위에서 아래로 당길 때만
        else if(Math.abs(dy)>12) drag="scroll";            // 그 외 세로 → 스크롤 양보
      }
      if(drag==="v"){ e.preventDefault(); const d=Math.max(0,dy); gallery.style.transform=`translateY(${d}px)`; gallery.style.opacity=String(Math.max(.4,1-d/600)); }
      else if(drag==="h"){ e.preventDefault(); gallery.style.transform=`translateX(${dx}px)`; gallery.style.opacity=String(Math.max(.4,1-Math.abs(dx)/500)); }
    },{passive:false});
    function endDrag(){
      if(!active){ return; }
      active=false;
      gallery.style.transition=""; gallery.style.opacity="";
      const tr=gallery.style.transform;
      let close=false;
      if(drag==="v"){ const m=/translateY\(([\d.]+)px\)/.exec(tr); if(m && parseFloat(m[1])>100) close=true; }
      else if(drag==="h"){ const m=/translateX\((-?[\d.]+)px\)/.exec(tr); if(m && Math.abs(parseFloat(m[1]))>80) close=true; }
      if(close){ closeGallery(); }
      else { gallery.style.transform=""; }   // 복귀(스냅백)
      drag=null;
    }
    gallery.addEventListener("touchend",endDrag);
    gallery.addEventListener("touchcancel",endDrag);
  })();

  // ---------- 에러 ----------
  function showError(e){
    let m="카메라를 열 수 없습니다.";
    if(e){
      if(e.name==="NotAllowedError") m="카메라 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.";
      else if(e.name==="NotFoundError") m="사용 가능한 카메라를 찾지 못했습니다.";
      else if(e.name==="NotReadableError") m="다른 앱이 카메라를 사용 중입니다.";
      else if(location.protocol!=="https:" && location.hostname!=="localhost") m="HTTPS 환경에서만 카메라를 사용할 수 있습니다.";
      else m+=" ("+(e.name||e.message||"unknown")+")";
    }
    errBox.textContent=m; errBox.classList.add("on"); gate.classList.remove("gone"); gate.classList.remove("hide");
  }
  function hideGate(){ gate.classList.add("hide"); setTimeout(()=>{ if(gate.classList.contains("hide")) gate.classList.add("gone"); },320); }

  // ---------- 라이프사이클 ----------
  document.addEventListener("visibilitychange",async()=>{
    if(document.hidden){ glStop(); if(recording) stopRec(); if(counting) cancelCountdown(); return; }   // 숨김 시 GL 정지·스트림 유지
    if(!gate.classList.contains("gone")) return;
    if(acquiring || Date.now()-lastAcquire < 1500){ videoEl.play().catch(()=>{}); if(GL.ok&&!gallery.classList.contains("open")) glStart(); return; }
    // 복귀: 트랙이 살아있으면 재생만 재개, 끊겼을 때만 재획득
    if(videoTrack && videoTrack.readyState==="live"){ videoEl.play().catch(()=>{}); if(GL.ok&&!gallery.classList.contains("open")) glStart(); return; }
    try{ await acquireCamera({withAudio:mode==="video"&&micOn}); }catch(e){ showError(e); }
  });
  window.addEventListener("pageshow",async(ev)=>{ if(ev.persisted && gate.classList.contains("gone") && !acquiring && Date.now()-lastAcquire>1500 && !(videoTrack&&videoTrack.readyState==="live")){ try{ await acquireCamera({withAudio:mode==="video"&&micOn}); }catch(e){ showError(e); } } });
  window.addEventListener("pagehide",()=>{ glStop(); if(recording) stopRec(); if(stream) stream.getTracks().forEach(t=>t.stop()); });

  // ---------- 부트 ----------
  async function boot(){
    errBox.classList.remove("on"); renderMic(); updateZoomUI(); renderGrid(); applyExposurePreview(); renderTimer(); renderEv(); renderRatio();
    if(!glInit()){ GL.ok=false; }     // WebGL 프리뷰 준비(실패 시 2D 폴백)
    renderStyle();
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      errBox.textContent="이 브라우저는 카메라 API를 지원하지 않습니다."; errBox.classList.add("on"); gate.classList.remove("hide"); return;
    }
    try{ await acquireCamera({withAudio:false}); hideGate(); loadGallery(); }
    catch(e){ showError(e); }
  }
  startBtn.addEventListener("click",boot);
  boot();
})();
</script>
</body>
</html>
