<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>무음 카메라 — Stage 3 보관함</title>
<style>
  :root{
    --bg:#000; --txt:#f2f3f5; --dim:#8b9099;
    --yellow:#FFCC00; --red:#FF3B30; --green:#34c759;
    --ease-spring:cubic-bezier(.32,.72,0,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;color:var(--txt);user-select:none;-webkit-user-select:none;position:fixed;inset:0;}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  #stage{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #preview{width:100%;height:100%;object-fit:cover;display:block;background:#000;}
  #preview.mirror{transform:scaleX(-1);}
  #canvas{display:none;}

  #top{position:absolute;top:0;left:0;right:0;z-index:5;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);pointer-events:none;}
  .readout{font-size:11px;letter-spacing:.06em;color:var(--yellow);display:flex;align-items:center;gap:7px;}
  .readout .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
  #stageTag{font-size:10px;color:var(--dim);letter-spacing:.08em;}

  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:6;}
  #flash.fire{animation:flash .32s ease-out;}
  @keyframes flash{0%{opacity:0}10%{opacity:.6}100%{opacity:0}}

  #bottom{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:18px 0 calc(env(safe-area-inset-bottom) + 22px);background:linear-gradient(to top,rgba(0,0,0,.55),transparent);}
  #dock{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 30px;}
  #thumb{justify-self:start;width:54px;height:54px;border-radius:12px;border:2px solid rgba(255,255,255,.4);background:#1a1c20 center/cover no-repeat;cursor:pointer;overflow:hidden;display:grid;place-items:center;transition:transform .15s;position:relative;}
  #thumb:active{transform:scale(.92);}
  #thumb .empt{color:var(--dim);font-size:10px;}
  #thumb .cnt{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 5px;border-radius:11px;background:var(--yellow);color:#1a1206;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;}
  #thumb .cnt.on{display:flex;}
  #shutter{justify-self:center;width:74px;height:74px;border-radius:50%;border:4px solid #fff;background:transparent;cursor:pointer;display:grid;place-items:center;transition:transform .12s var(--ease-spring);}
  #shutter:active{transform:scale(.92);}
  #shutter .core{width:60px;height:60px;border-radius:50%;background:#fff;transition:.18s;}
  #flip{justify-self:end;width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(30,30,30,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:var(--txt);display:grid;place-items:center;cursor:pointer;transition:transform .25s var(--ease-spring);}
  #flip:active{transform:scale(.9) rotate(180deg);}
  #flip svg{width:24px;height:24px;}

  #gate{position:absolute;inset:0;z-index:30;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 28px;gap:16px;}
  #gate.hide{display:none;}
  #gate .ic{width:60px;height:60px;border-radius:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;color:var(--yellow);}
  #gate .ic svg{width:30px;height:30px;}
  #gate h1{font-size:22px;font-weight:700;}
  #gate p{color:var(--dim);font-size:14px;line-height:1.6;max-width:330px;}
  #gate .err{color:var(--red);font-size:12px;line-height:1.5;max-width:330px;display:none;}
  #gate .err.on{display:block;}
  #start{margin-top:4px;border:none;background:var(--yellow);color:#1a1206;font-family:inherit;font-size:16px;font-weight:700;padding:14px 38px;border-radius:13px;cursor:pointer;transition:transform .15s;}
  #start:active{transform:scale(.96);}

  /* gallery */
  #gallery{position:absolute;inset:0;z-index:20;background:var(--bg);transform:translateY(100%);transition:transform .34s var(--ease-spring);display:flex;flex-direction:column;}
  #gallery.open{transform:translateY(0);}
  .ghead{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:calc(env(safe-area-inset-top) + 16px) 16px 12px;border-bottom:1px solid rgba(255,255,255,.08);}
  .ghead h2{font-size:17px;font-weight:700;white-space:nowrap;}
  .gbtns{display:flex;gap:7px;flex:1;justify-content:flex-end;}
  .gbtn{border:1px solid rgba(255,255,255,.14);background:#1c1c1e;color:var(--txt);font-family:inherit;font-size:12px;font-weight:600;padding:9px 12px;border-radius:11px;cursor:pointer;white-space:nowrap;}
  .gbtn:active{transform:scale(.95);}
  .gbtn.primary{background:var(--yellow);color:#1a1206;border-color:var(--yellow);}
  .ghint{padding:8px 16px 0;font-size:11px;color:var(--dim);line-height:1.5;}
  #ggrid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start;}
  .gitem{position:relative;aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:#16181c;}
  .gitem img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .gitem .badge{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:var(--green);display:none;align-items:center;justify-content:center;}
  .gitem.saved .badge{display:flex;}
  .gitem .badge svg{width:12px;height:12px;color:#fff;}
  .gitem .acts{position:absolute;bottom:0;left:0;right:0;display:flex;}
  .gitem .acts button{flex:1;border:none;padding:8px 0;font-size:11px;font-weight:600;font-family:inherit;background:rgba(0,0,0,.62);color:#fff;cursor:pointer;}
  .gitem .acts button.del{color:var(--red);}
  .gempty{grid-column:1/-1;text-align:center;color:var(--dim);padding:50px 20px;font-size:14px;line-height:1.6;}

  /* fullscreen viewer */
  #viewer{position:absolute;inset:0;z-index:40;background:#000;display:none;flex-direction:column;}
  #viewer.open{display:flex;}
  .vhead{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;}
  .vhead .vmeta{font-size:12px;color:var(--dim);}
  .vhead .vx{border:none;background:rgba(255,255,255,.12);color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:grid;place-items:center;}
  #vstage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #vimg{max-width:100%;max-height:100%;object-fit:contain;display:block;}
  .varrow{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:22px;display:grid;place-items:center;cursor:pointer;}
  #vprev{left:12px;} #vnext{right:12px;}
  .vfoot{display:flex;gap:10px;padding:14px 18px calc(env(safe-area-inset-bottom) + 18px);}
  .vfoot button{flex:1;border:none;font-family:inherit;font-size:15px;font-weight:600;padding:14px 0;border-radius:13px;cursor:pointer;}
  #vsave{background:var(--yellow);color:#1a1206;}
  #vdel{background:#1c1c1e;color:var(--red);border:1px solid rgba(255,59,48,.3);}
</style>
</head>
<body>

<div id="stage">
  <video id="preview" autoplay muted playsinline disablepictureinpicture></video>
  <canvas id="canvas"></canvas>
</div>

<div id="flash"></div>

<div id="top">
  <div class="readout"><span class="dot"></span><span id="resTxt">--</span></div>
  <div id="stageTag" class="mono">STAGE&nbsp;3</div>
</div>

<div id="bottom">
  <div id="dock">
    <div id="thumb"><span class="empt mono">보관함</span><span class="cnt mono" id="thumbCnt">0</span></div>
    <button id="shutter"><span class="core"></span></button>
    <button id="flip" title="카메라 전환">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h3a2 2 0 0 1 2 2v3M9 20H6a2 2 0 0 1-2-2v-3"/><path d="M20 9l-3-3-3 3M4 15l3 3 3-3"/></svg>
    </button>
  </div>
</div>

<div id="gallery">
  <div class="ghead">
    <h2>보관함 <span class="mono" id="galCnt" style="font-size:12px;color:var(--dim)"></span></h2>
    <div class="gbtns">
      <button class="gbtn primary" id="saveAll">모두 저장</button>
      <button class="gbtn" id="cleanup">정리</button>
      <button class="gbtn" id="galClose">닫기</button>
    </div>
  </div>
  <div class="ghint">사진은 보관함에 모입니다. <b>모두 저장</b>으로 사진첩에 한 번에 저장하세요. ✓ 표시된 저장본은 7일 후 자동 정리됩니다.</div>
  <div id="ggrid"></div>
</div>

<div id="viewer">
  <div class="vhead"><span class="vmeta" id="vmeta"></span><button class="vx" id="vclose">✕</button></div>
  <div id="vstage">
    <button class="varrow" id="vprev">‹</button>
    <img id="vimg" alt="">
    <button class="varrow" id="vnext">›</button>
  </div>
  <div class="vfoot">
    <button id="vsave">사진첩에 저장</button>
    <button id="vdel">삭제</button>
  </div>
</div>

<div id="gate" class="hide">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h2l1.5-2h7L19 5h0a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.5"/></svg></div>
  <h1>무음 카메라</h1>
  <p>셔터음 없이 촬영합니다. 카메라 접근을 허용하면 바로 사용할 수 있어요.</p>
  <div class="err" id="errBox"></div>
  <button id="start">카메라 다시 시도</button>
</div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);

  const videoEl=$("#preview"), canvas=$("#canvas");
  const resTxt=$("#resTxt"), flash=$("#flash");
  const shutter=$("#shutter"), flip=$("#flip"), thumb=$("#thumb"), thumbCnt=$("#thumbCnt");
  const gate=$("#gate"), startBtn=$("#start"), errBox=$("#errBox");
  const gallery=$("#gallery"), ggrid=$("#ggrid"), galCnt=$("#galCnt");
  const viewer=$("#viewer"), vimg=$("#vimg"), vmeta=$("#vmeta");

  // ---------- 상태 ----------
  let stream=null, videoTrack=null;
  let facing="environment";
  const mode="photo";
  const items=[];   // {id, url, file, ts, saved, savedAt}
  let viewIndex=-1;
  const WEEK=7*24*60*60*1000;

  const RES_LADDER=[
    {width:{ideal:3840},height:{ideal:2160}},
    {width:{ideal:1920},height:{ideal:1080}},
    {width:{ideal:1280},height:{ideal:720}},
    {}
  ];

  // ---------- IndexedDB ----------
  let _db=null;
  function openDB(){
    if(_db) return Promise.resolve(_db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open("silentcam",1);
      r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("photos")) r.result.createObjectStore("photos",{keyPath:"id"}); };
      r.onsuccess=()=>{ _db=r.result; res(_db); };
      r.onerror=()=>rej(r.error);
    });
  }
  function txDone(tx){ return new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=()=>rej(tx.error); tx.onabort=()=>rej(tx.error); }); }
  function reqProm(req){ return new Promise((res,rej)=>{ req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
  function getAll(db){
    return new Promise((res,rej)=>{
      const out=[]; const req=db.transaction("photos").objectStore("photos").openCursor();
      req.onsuccess=e=>{ const c=e.target.result; if(c){ out.push(c.value); c.continue(); } else res(out); };
      req.onerror=()=>rej(req.error);
    });
  }
  async function dbPut(rec){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").put(rec); await txDone(tx); }
  async function dbDelete(id){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").delete(id); await txDone(tx); }
  async function dbMarkSaved(id, savedAt){
    const db=await openDB(); const tx=db.transaction("photos","readwrite"); const st=tx.objectStore("photos");
    const rec=await reqProm(st.get(id));
    if(rec){ rec.saved=true; rec.savedAt=savedAt; st.put(rec); }
    await txDone(tx);
  }

  // ---------- 카메라 ----------
  async function acquireCamera({withAudio=false}={}){
    await teardownStream();
    let lastErr=null;
    for(const res of RES_LADDER){
      try{
        const s=await navigator.mediaDevices.getUserMedia({audio:withAudio?true:false,video:{facingMode:{ideal:facing},...res}});
        stream=s; videoTrack=s.getVideoTracks()[0];
        attachPreview(s); updateRes();
        return s;
      }catch(e){ lastErr=e; if(e.name==="NotAllowedError"||e.name==="NotFoundError") throw e; }
    }
    throw lastErr||new Error("unknown");
  }
  async function teardownStream(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); }
    if(videoEl){ try{videoEl.pause();}catch(_){} videoEl.srcObject=null; }
    stream=null; videoTrack=null;
  }
  function attachPreview(s){
    videoEl.srcObject=s; videoEl.muted=true; videoEl.playsInline=true;
    videoEl.classList.toggle("mirror", facing==="user");
    videoEl.play().catch(()=>{});
  }
  function updateRes(){
    const set=videoTrack&&videoTrack.getSettings?videoTrack.getSettings():{};
    const w=set.width||videoEl.videoWidth, h=set.height||videoEl.videoHeight;
    const lens=facing==="user"?"전면":"후면";
    resTxt.textContent=(w&&h)?`${lens} · ${w}×${h}`:lens;
  }

  function fname(ts){
    const d=new Date(ts||Date.now()), p=n=>String(n).padStart(2,"0");
    return `IMG_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.jpg`;
  }

  // ---------- 촬영 (팝업 없이 보관함에만) ----------
  function onShutter(){
    if(!stream) return;
    const w=videoEl.videoWidth, h=videoEl.videoHeight;
    if(!w||!h) return;
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext("2d");
    if(facing==="user"){ ctx.translate(w,0); ctx.scale(-1,1); }
    ctx.drawImage(videoEl,0,0,w,h);
    flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");

    canvas.toBlob(async (blob)=>{
      if(!blob) return;
      const ts=Date.now();
      const id=ts+"_"+Math.random().toString(36).slice(2,6);
      const url=URL.createObjectURL(blob);
      const file=new File([blob], fname(ts), {type:"image/jpeg"});
      items.unshift({id,url,file,ts,saved:false,savedAt:0});
      refreshThumb();
      if(gallery.classList.contains("open")) renderGallery();
      try{
        const buf=await blob.arrayBuffer();
        await dbPut({id,ts,type:"image/jpeg",bytes:buf,w,h,saved:false,savedAt:0});
      }catch(e){ console.warn("저장 실패(메모리 유지):",e); }
    }, "image/jpeg", 0.95);
  }

  // ---------- 전/후면 ----------
  let switching=false;
  async function switchCamera(){
    if(switching) return; switching=true;
    facing=(facing==="environment")?"user":"environment";
    try{ await acquireCamera({withAudio:mode!=="photo"}); }catch(e){ showError(e); }
    finally{ switching=false; }
  }

  // ---------- 사진첩 저장 (공유시트) ----------
  function downloadFallback(it){
    const a=document.createElement("a"); a.href=it.url; a.download=it.file.name;
    document.body.appendChild(a); a.click(); a.remove();
  }
  async function markSaved(list){
    const now=Date.now();
    for(const it of list){ it.saved=true; it.savedAt=now; try{ await dbMarkSaved(it.id, now); }catch(_){} }
  }
  // 한 장 저장
  function saveOne(it){
    if(navigator.canShare && navigator.canShare({files:[it.file]})){
      navigator.share({files:[it.file]}).then(async()=>{ await markSaved([it]); renderGallery(); refreshViewerState(); }).catch(()=>{});
    }else{ downloadFallback(it); }
  }
  // 모두 저장 (미저장분 전부 한 번에)
  function saveAll(){
    let list=items.filter(it=>!it.saved);
    if(!list.length) list=items.slice();
    if(!list.length) return;
    const files=list.map(it=>it.file);
    if(navigator.canShare && navigator.canShare({files})){
      navigator.share({files}).then(async()=>{ await markSaved(list); renderGallery(); }).catch(err=>{
        if(err && err.name!=="AbortError") alert("한 번에 저장이 안 되면 장수를 줄여 시도하거나 한 장씩 저장해 주세요.");
      });
    }else{
      // 다중 공유 미지원 → 하나씩 다운로드 폴백
      list.forEach(downloadFallback);
    }
  }

  // ---------- 삭제 / 정리 ----------
  async function deleteItem(id){
    const i=items.findIndex(x=>x.id===id);
    if(i>=0){ URL.revokeObjectURL(items[i].url); items.splice(i,1); }
    refreshThumb(); renderGallery();
    try{ await dbDelete(id); }catch(_){}
  }
  async function cleanupSaved(manual){
    const now=Date.now();
    const targets=items.filter(it=>it.saved && it.savedAt && (now-it.savedAt)>WEEK);
    if(manual && !targets.length){ alert("정리할 7일 지난 저장본이 없습니다."); return; }
    for(const it of targets){
      URL.revokeObjectURL(it.url);
      const i=items.indexOf(it); if(i>=0) items.splice(i,1);
      try{ await dbDelete(it.id); }catch(_){}
    }
    refreshThumb(); renderGallery();
    if(manual) alert(`${targets.length}장 정리했습니다.`);
  }

  // ---------- 갤러리 UI ----------
  function refreshThumb(){
    thumbCnt.textContent=items.length;
    thumbCnt.classList.toggle("on", items.length>0);
    const empt=thumb.querySelector(".empt");
    if(items.length){ empt.style.display="none"; thumb.style.backgroundImage=`url(${items[0].url})`; }
    else { empt.style.display="block"; thumb.style.backgroundImage="none"; }
  }
  function renderGallery(){
    galCnt.textContent=items.length?`(${items.length})`:"";
    if(!items.length){ ggrid.innerHTML='<div class="gempty">아직 촬영한 사진이 없습니다.</div>'; return; }
    ggrid.innerHTML="";
    items.forEach((it,idx)=>{
      const el=document.createElement("div"); el.className="gitem"+(it.saved?" saved":"");
      el.innerHTML=`
        <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></span>
        <img src="${it.url}" data-idx="${idx}" alt="">
        <div class="acts">
          <button data-act="save" data-id="${it.id}">저장</button>
          <button class="del" data-act="del" data-id="${it.id}">삭제</button>
        </div>`;
      ggrid.appendChild(el);
    });
  }
  ggrid.addEventListener("click",e=>{
    const img=e.target.closest("img[data-idx]");
    if(img){ openViewer(parseInt(img.dataset.idx,10)); return; }
    const b=e.target.closest("button[data-act]"); if(!b) return;
    const it=items.find(x=>x.id===b.dataset.id); if(!it) return;
    if(b.dataset.act==="save") saveOne(it);
    else if(b.dataset.act==="del"){ if(confirm("이 사진을 삭제할까요?")) deleteItem(it.id); }
  });

  // ---------- 전체화면 뷰어 ----------
  function openViewer(idx){
    if(idx<0||idx>=items.length) return;
    viewIndex=idx; renderViewer(); viewer.classList.add("open");
  }
  function renderViewer(){
    const it=items[viewIndex]; if(!it){ closeViewer(); return; }
    vimg.src=it.url;
    vmeta.textContent=`${viewIndex+1} / ${items.length}${it.saved?" · 저장됨 ✓":""}`;
  }
  function refreshViewerState(){ if(viewer.classList.contains("open")) renderViewer(); }
  function closeViewer(){ viewer.classList.remove("open"); viewIndex=-1; }
  $("#vclose").addEventListener("click",closeViewer);
  $("#vprev").addEventListener("click",()=>{ if(viewIndex>0){ viewIndex--; renderViewer(); } });
  $("#vnext").addEventListener("click",()=>{ if(viewIndex<items.length-1){ viewIndex++; renderViewer(); } });
  $("#vsave").addEventListener("click",()=>{ const it=items[viewIndex]; if(it) saveOne(it); });
  $("#vdel").addEventListener("click",async()=>{
    const it=items[viewIndex]; if(!it) return;
    if(!confirm("이 사진을 삭제할까요?")) return;
    await deleteItem(it.id);
    if(!items.length){ closeViewer(); return; }
    if(viewIndex>=items.length) viewIndex=items.length-1;
    renderViewer();
  });
  // 스와이프
  let sx=0;
  $("#vstage").addEventListener("touchstart",e=>{ sx=e.touches[0].clientX; },{passive:true});
  $("#vstage").addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(dx>50 && viewIndex>0){ viewIndex--; renderViewer(); }
    else if(dx<-50 && viewIndex<items.length-1){ viewIndex++; renderViewer(); }
  },{passive:true});

  // ---------- 로드 (7일 정리 포함) ----------
  async function loadGallery(){
    try{
      const db=await openDB();
      const recs=await getAll(db);
      const now=Date.now();
      recs.sort((a,b)=>b.ts-a.ts);
      for(const r of recs){
        if(r.saved && r.savedAt && (now-r.savedAt)>WEEK){ try{ await dbDelete(r.id); }catch(_){} continue; }
        const blob=new Blob([r.bytes],{type:r.type||"image/jpeg"});
        const url=URL.createObjectURL(blob);
        const file=new File([blob], fname(r.ts), {type:r.type||"image/jpeg"});
        items.push({id:r.id,url,file,ts:r.ts,saved:!!r.saved,savedAt:r.savedAt||0});
      }
      refreshThumb();
    }catch(e){ console.warn("보관함 로드 실패:",e); }
  }

  // ---------- 이벤트 ----------
  shutter.addEventListener("click",onShutter);
  flip.addEventListener("click",switchCamera);
  thumb.addEventListener("click",()=>{ renderGallery(); gallery.classList.add("open"); });
  $("#galClose").addEventListener("click",()=>gallery.classList.remove("open"));
  $("#saveAll").addEventListener("click",saveAll);
  $("#cleanup").addEventListener("click",()=>cleanupSaved(true));

  // ---------- 에러 ----------
  function showError(e){
    let m="카메라를 열 수 없습니다.";
    if(e){
      if(e.name==="NotAllowedError") m="카메라 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.";
      else if(e.name==="NotFoundError") m="사용 가능한 카메라를 찾지 못했습니다.";
      else if(e.name==="NotReadableError") m="다른 앱이 카메라를 사용 중입니다.";
      else if(location.protocol!=="https:" && location.hostname!=="localhost") m="HTTPS 환경에서만 카메라를 사용할 수 있습니다.";
      else m+=" ("+(e.name||e.message||"unknown")+")";
    }
    errBox.textContent=m; errBox.classList.add("on"); gate.classList.remove("hide");
  }

  // ---------- 라이프사이클 ----------
  document.addEventListener("visibilitychange",async()=>{
    if(document.hidden){ await teardownStream(); return; }
    if(gate.classList.contains("hide")){ try{ await acquireCamera({withAudio:mode!=="photo"}); }catch(e){ showError(e); } }
  });
  window.addEventListener("pageshow",async(ev)=>{
    if(ev.persisted && gate.classList.contains("hide")){ try{ await acquireCamera({withAudio:mode!=="photo"}); }catch(e){ showError(e); } }
  });
  window.addEventListener("pagehide",()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); });

  // ---------- 부트 ----------
  async function boot(){
    errBox.classList.remove("on");
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      errBox.textContent="이 브라우저는 카메라 API를 지원하지 않습니다."; errBox.classList.add("on"); gate.classList.remove("hide"); return;
    }
    try{ await acquireCamera({withAudio:false}); gate.classList.add("hide"); loadGallery(); }
    catch(e){ showError(e); }
  }
  startBtn.addEventListener("click",boot);
  boot();
})();
</script>
</body>
</html>
