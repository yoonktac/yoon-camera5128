<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>무음 카메라 — Stage 1 코어</title>
<style>
  :root{
    --bg:#000; --txt:#f2f3f5; --dim:#8b9099;
    --yellow:#FFCC00; --red:#FF3B30;
    --ease-spring:cubic-bezier(.32,.72,0,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;
    color:var(--txt);user-select:none;-webkit-user-select:none;position:fixed;inset:0;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  /* viewport */
  #stage{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #preview{width:100%;height:100%;object-fit:cover;display:block;background:#000;}
  #preview.mirror{transform:scaleX(-1);}
  #canvas{display:none;}

  /* top readout */
  #top{
    position:absolute;top:0;left:0;right:0;z-index:5;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);
    pointer-events:none;
  }
  .readout{font-size:11px;letter-spacing:.06em;color:var(--yellow);display:flex;align-items:center;gap:7px;}
  .readout .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
  #stageTag{font-size:10px;color:var(--dim);letter-spacing:.08em;}

  /* flash feedback */
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:6;}
  #flash.fire{animation:flash .32s ease-out;}
  @keyframes flash{0%{opacity:0}10%{opacity:.6}100%{opacity:0}}

  /* bottom controls */
  #bottom{
    position:absolute;left:0;right:0;bottom:0;z-index:5;
    padding:18px 0 calc(env(safe-area-inset-bottom) + 22px);
    background:linear-gradient(to top,rgba(0,0,0,.55),transparent);
  }
  #dock{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 30px;}

  #thumb{
    justify-self:start;width:54px;height:54px;border-radius:12px;border:2px solid rgba(255,255,255,.4);
    background:#1a1c20 center/cover no-repeat;cursor:pointer;overflow:hidden;
    display:grid;place-items:center;transition:transform .15s;
  }
  #thumb:active{transform:scale(.92);}
  #thumb .empt{color:var(--dim);font-size:10px;}

  #shutter{
    justify-self:center;width:74px;height:74px;border-radius:50%;border:4px solid #fff;
    background:transparent;cursor:pointer;display:grid;place-items:center;
    transition:transform .12s var(--ease-spring);
  }
  #shutter:active{transform:scale(.92);}
  #shutter .core{width:60px;height:60px;border-radius:50%;background:#fff;transition:.18s;}

  #flip{
    justify-self:end;width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.15);
    background:rgba(30,30,30,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    color:var(--txt);display:grid;place-items:center;cursor:pointer;transition:transform .25s var(--ease-spring);
  }
  #flip:active{transform:scale(.9) rotate(180deg);}
  #flip svg{width:24px;height:24px;}

  /* error / retry gate */
  #gate{
    position:absolute;inset:0;z-index:30;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 28px;gap:16px;
  }
  #gate.hide{display:none;}
  #gate .ic{width:60px;height:60px;border-radius:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;color:var(--yellow);}
  #gate .ic svg{width:30px;height:30px;}
  #gate h1{font-size:22px;font-weight:700;}
  #gate p{color:var(--dim);font-size:14px;line-height:1.6;max-width:330px;}
  #gate .err{color:var(--red);font-size:12px;line-height:1.5;max-width:330px;display:none;}
  #gate .err.on{display:block;}
  #start{
    margin-top:4px;border:none;background:var(--yellow);color:#1a1206;
    font-family:inherit;font-size:16px;font-weight:700;padding:14px 38px;border-radius:13px;cursor:pointer;transition:transform .15s;
  }
  #start:active{transform:scale(.96);}

  /* lightweight session gallery */
  #gallery{
    position:absolute;inset:0;z-index:20;background:var(--bg);
    transform:translateY(100%);transition:transform .34s var(--ease-spring);
    display:flex;flex-direction:column;
  }
  #gallery.open{transform:translateY(0);}
  .ghead{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 16px) 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
  .ghead h2{font-size:18px;font-weight:700;}
  .ghead .x{border:none;background:var(--yellow);color:#1a1206;font-family:inherit;font-size:13px;font-weight:600;padding:9px 16px;border-radius:11px;cursor:pointer;}
  #ggrid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start;}
  .gitem{position:relative;aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:#16181c;}
  .gitem img{width:100%;height:100%;object-fit:cover;display:block;}
  .gitem button{position:absolute;bottom:0;left:0;right:0;border:none;padding:7px 0;font-size:11px;font-weight:600;font-family:inherit;background:rgba(0,0,0,.6);color:#fff;cursor:pointer;}
  .gempty{grid-column:1/-1;text-align:center;color:var(--dim);padding:50px 20px;font-size:14px;line-height:1.6;}
</style>
</head>
<body>

<div id="stage">
  <video id="preview" autoplay muted playsinline disablepictureinpicture></video>
  <canvas id="canvas"></canvas>
</div>

<div id="flash"></div>

<div id="top">
  <div class="readout"><span class="dot"></span><span id="resTxt">--</span></div>
  <div id="stageTag" class="mono">STAGE&nbsp;1&nbsp;·&nbsp;CORE</div>
</div>

<div id="bottom">
  <div id="dock">
    <div id="thumb"><span class="empt mono">갤러리</span></div>
    <button id="shutter"><span class="core"></span></button>
    <button id="flip" title="카메라 전환">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h3a2 2 0 0 1 2 2v3M9 20H6a2 2 0 0 1-2-2v-3"/><path d="M20 9l-3-3-3 3M4 15l3 3 3-3"/></svg>
    </button>
  </div>
</div>

<div id="gallery">
  <div class="ghead"><h2>갤러리 <span class="mono" id="galCnt" style="font-size:12px;color:var(--dim)"></span></h2><button class="x" id="galClose">닫기</button></div>
  <div id="ggrid"></div>
</div>

<div id="gate" class="hide">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h2l1.5-2h7L19 5h0a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.5"/></svg></div>
  <h1>무음 카메라</h1>
  <p>셔터음 없이 촬영합니다. 카메라 접근을 허용하면 바로 사용할 수 있어요.</p>
  <div class="err" id="errBox"></div>
  <button id="start">카메라 다시 시도</button>
</div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);

  const videoEl=$("#preview"), canvas=$("#canvas");
  const resTxt=$("#resTxt"), flash=$("#flash");
  const shutter=$("#shutter"), flip=$("#flip"), thumb=$("#thumb");
  const gate=$("#gate"), startBtn=$("#start"), errBox=$("#errBox");
  const gallery=$("#gallery"), ggrid=$("#ggrid"), galCnt=$("#galCnt");

  // ---------- 상태 ----------
  let stream=null, videoTrack=null;
  let facing="environment";   // 'environment' | 'user'
  const mode="photo";         // stage1은 사진만
  const items=[];             // {id, url, blob}  (세션 메모리)

  // 해상도 사다리: 4K → 1080 → 720 → 무제약
  const RES_LADDER=[
    {width:{ideal:3840},height:{ideal:2160}},
    {width:{ideal:1920},height:{ideal:1080}},
    {width:{ideal:1280},height:{ideal:720}},
    {}
  ];

  // ---------- 카메라 획득 ----------
  async function acquireCamera({withAudio=false}={}){
    // iOS: 두 번째 getUserMedia가 첫 트랙을 mute 시키는 버그 → 먼저 정리
    await teardownStream();

    let lastErr=null;
    for(const res of RES_LADDER){
      try{
        const constraints={
          audio: withAudio ? true : false,
          video:{ facingMode:{ideal:facing}, ...res }  // exact 금지
        };
        const s=await navigator.mediaDevices.getUserMedia(constraints);
        stream=s; videoTrack=s.getVideoTracks()[0];
        attachPreview(s);
        updateRes();
        return s;
      }catch(e){
        lastErr=e;
        // 권한 거부/장치 없음은 즉시 중단, Overconstrained만 다음 사다리
        if(e.name==="NotAllowedError" || e.name==="NotFoundError") throw e;
      }
    }
    throw lastErr || new Error("unknown");
  }

  async function teardownStream(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); }
    if(videoEl){ try{videoEl.pause();}catch(_){} videoEl.srcObject=null; }
    stream=null; videoTrack=null;
  }

  function attachPreview(s){
    videoEl.srcObject=s;
    videoEl.muted=true; videoEl.playsInline=true;
    videoEl.classList.toggle("mirror", facing==="user");
    videoEl.play().catch(()=>{}); // iOS에서 reject는 무해
  }

  function updateRes(){
    const set = videoTrack && videoTrack.getSettings ? videoTrack.getSettings() : {};
    const w=set.width||videoEl.videoWidth, h=set.height||videoEl.videoHeight;
    const lens = facing==="user" ? "전면" : "후면";
    resTxt.textContent = (w&&h) ? `${lens} · ${w}×${h}` : lens;
  }

  // ---------- 무음 사진 캡처 ----------
  function capturePhoto(){
    if(!stream) return;
    const w=videoEl.videoWidth, h=videoEl.videoHeight;
    if(!w||!h) return;
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext("2d");
    // 전면 카메라: 프리뷰가 미러이므로 저장도 미러로 맞춰 셀카 느낌 유지
    if(facing==="user"){ ctx.translate(w,0); ctx.scale(-1,1); }
    ctx.drawImage(videoEl,0,0,w,h);
    canvas.toBlob(b=>{ if(b) addItem(b); }, "image/jpeg", 0.95);
    // 시각 피드백 (무음)
    flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");
  }

  // ---------- 전/후면 전환 ----------
  let switching=false;
  async function switchCamera(){
    if(switching) return;
    switching=true;
    facing = (facing==="environment") ? "user" : "environment";
    try{ await acquireCamera({withAudio: mode!=="photo"}); }
    catch(e){ showError(e); }
    finally{ switching=false; }
  }

  // ---------- 세션 갤러리 ----------
  function addItem(blob){
    const url=URL.createObjectURL(blob);
    const id=Date.now()+"_"+Math.random().toString(36).slice(2,6);
    items.unshift({id,url,blob});
    refreshThumb();
    if(gallery.classList.contains("open")) renderGallery();
  }
  function refreshThumb(){
    const empt=thumb.querySelector(".empt");
    if(items.length){ empt.style.display="none"; thumb.style.backgroundImage=`url(${items[0].url})`; }
    else { empt.style.display="block"; thumb.style.backgroundImage="none"; }
  }
  function fname(){
    const d=new Date(), p=n=>String(n).padStart(2,"0");
    return `IMG_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.jpg`;
  }
  function download(it){
    const a=document.createElement("a");
    a.href=it.url; a.download=fname();
    document.body.appendChild(a); a.click(); a.remove();
  }
  function renderGallery(){
    galCnt.textContent = items.length ? `(${items.length})` : "";
    if(!items.length){ ggrid.innerHTML='<div class="gempty">아직 촬영한 사진이 없습니다.</div>'; return; }
    ggrid.innerHTML="";
    items.forEach(it=>{
      const el=document.createElement("div"); el.className="gitem";
      el.innerHTML=`<img src="${it.url}" alt=""><button data-id="${it.id}">저장</button>`;
      ggrid.appendChild(el);
    });
  }
  ggrid.addEventListener("click",e=>{
    const b=e.target.closest("button[data-id]"); if(!b) return;
    const it=items.find(x=>x.id===b.dataset.id); if(it) download(it);
  });

  // ---------- 이벤트 ----------
  shutter.addEventListener("click",capturePhoto);
  flip.addEventListener("click",switchCamera);
  thumb.addEventListener("click",()=>{ renderGallery(); gallery.classList.add("open"); });
  $("#galClose").addEventListener("click",()=>gallery.classList.remove("open"));

  // ---------- 에러 ----------
  function showError(e){
    let m="카메라를 열 수 없습니다.";
    if(e){
      if(e.name==="NotAllowedError") m="카메라 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.";
      else if(e.name==="NotFoundError") m="사용 가능한 카메라를 찾지 못했습니다.";
      else if(e.name==="NotReadableError") m="다른 앱이 카메라를 사용 중입니다.";
      else if(location.protocol!=="https:" && location.hostname!=="localhost")
        m="HTTPS 환경에서만 카메라를 사용할 수 있습니다. (배포 후 접속)";
      else m+=" ("+(e.name||e.message||"unknown")+")";
    }
    errBox.textContent=m; errBox.classList.add("on");
    gate.classList.remove("hide");
  }

  // ---------- 라이프사이클 ----------
  document.addEventListener("visibilitychange",async()=>{
    if(document.hidden){ await teardownStream(); return; }
    // 복귀: 에러 게이트가 떠있지 않은(=정상 작동중이던) 경우에만 재획득
    if(gate.classList.contains("hide")){
      try{ await acquireCamera({withAudio:mode!=="photo"}); }
      catch(e){ showError(e); }
    }
  });
  window.addEventListener("pageshow",async(ev)=>{
    if(ev.persisted && gate.classList.contains("hide")){
      try{ await acquireCamera({withAudio:mode!=="photo"}); }catch(e){ showError(e); }
    }
  });
  window.addEventListener("pagehide",()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); });

  // ---------- 부트 (열자마자 자동) ----------
  async function boot(){
    errBox.classList.remove("on");
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      errBox.textContent="이 브라우저는 카메라 API를 지원하지 않습니다."; errBox.classList.add("on");
      gate.classList.remove("hide"); return;
    }
    try{ await acquireCamera({withAudio:false}); gate.classList.add("hide"); }
    catch(e){ showError(e); }
  }
  startBtn.addEventListener("click",boot);
  boot();
})();
</script>
</body>
</html>
