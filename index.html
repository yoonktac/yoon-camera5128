<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>무음 카메라</title>
<style>
  :root{
    --bg:#000; --txt:#f2f3f5; --dim:#8b9099;
    --yellow:#FFCC00; --red:#FF3B30; --green:#34c759;
    --ease-spring:cubic-bezier(.32,.72,0,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;color:var(--txt);user-select:none;-webkit-user-select:none;position:fixed;inset:0;}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}

  #stage{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;}
  #preview{width:100%;height:100%;object-fit:cover;display:block;background:#000;transform-origin:center center;filter:brightness(var(--ev-b,1)) contrast(var(--ev-c,1));}
  /* 3x3 격자 */
  #grid{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity .25s;}
  #grid.on{opacity:1;}
  #grid i{position:absolute;background:rgba(255,255,255,.28);}
  #grid i.v1{left:33.33%;top:0;bottom:0;width:1px;} #grid i.v2{left:66.66%;top:0;bottom:0;width:1px;}
  #grid i.h1{top:33.33%;left:0;right:0;height:1px;} #grid i.h2{top:66.66%;left:0;right:0;height:1px;}
  /* 탭 포커스 사각형 */
  #focus{position:absolute;z-index:7;width:75px;height:75px;margin:-37px 0 0 -37px;border:1px solid var(--yellow);border-radius:3px;pointer-events:none;display:none;box-shadow:0 0 0 .5px rgba(0,0,0,.3);}
  #focus.show{display:block;animation:focusIn .3s cubic-bezier(0,0,.58,1),focusPulse .4s .3s cubic-bezier(.42,0,.58,1);}
  @keyframes focusIn{from{transform:scale(1.5);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes focusPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
  #focus.fade{opacity:.35;transition:opacity .6s;}
  /* 노출 태양 슬라이더 */
  #sun{position:absolute;z-index:8;width:36px;height:150px;margin-top:-75px;display:none;flex-direction:column;align-items:center;pointer-events:auto;}
  #sun.show{display:flex;}
  #sun .track{position:absolute;top:14px;bottom:14px;width:2px;background:rgba(255,204,0,.4);}
  #sun .knob{position:absolute;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:var(--yellow);filter:drop-shadow(0 1px 3px rgba(0,0,0,.6));cursor:grab;touch-action:none;}
  #sun .knob svg{width:24px;height:24px;}
  #canvas{display:none;}

  #top{position:absolute;top:0;left:0;right:0;z-index:5;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);}
  .readout{font-size:11px;letter-spacing:.06em;color:var(--yellow);display:flex;align-items:center;gap:7px;pointer-events:none;}
  .readout .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
  #micBtn{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.04em;color:var(--dim);background:rgba(30,30,30,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:7px 11px;cursor:pointer;}
  #micBtn svg{width:15px;height:15px;}
  #micBtn.on,#gridBtn.on{color:var(--yellow);border-color:rgba(255,204,0,.4) !important;}

  #recBadge{position:absolute;top:calc(env(safe-area-inset-top) + 56px);left:50%;transform:translateX(-50%);z-index:6;display:none;align-items:center;gap:8px;padding:7px 14px;border-radius:30px;background:rgba(0,0,0,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-size:13px;font-weight:700;letter-spacing:.05em;}
  #recBadge.on{display:flex;}
  #recBadge .pulse{width:9px;height:9px;border-radius:50%;background:var(--red);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:6;}
  #flash.fire{animation:flash .32s ease-out;}
  @keyframes flash{0%{opacity:0}10%{opacity:.6}100%{opacity:0}}

  /* zoom pills */
  #zoomBar{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 150px);z-index:5;display:flex;justify-content:center;gap:10px;transition:opacity .2s;}
  #zoomBar.hide{opacity:0;pointer-events:none;}
  .zpill{min-width:34px;height:34px;padding:0 8px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.4);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;font-size:12px;font-weight:600;display:grid;place-items:center;cursor:pointer;transition:.18s;}
  .zpill.sel{background:rgba(0,0,0,.6);color:var(--yellow);transform:scale(1.08);min-width:44px;border-radius:22px;}
  #zoomLive{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 194px);z-index:6;font-size:13px;font-weight:700;color:var(--yellow);background:rgba(0,0,0,.5);padding:4px 12px;border-radius:20px;display:none;}
  #zoomLive.on{display:block;}

  #bottom{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:14px 0 calc(env(safe-area-inset-bottom) + 20px);background:linear-gradient(to top,rgba(0,0,0,.55),transparent);}
  #modes{display:flex;justify-content:center;gap:26px;margin-bottom:16px;}
  .mode{font-size:14px;font-weight:700;letter-spacing:.04em;color:var(--dim);cursor:pointer;padding:5px 4px;position:relative;transition:.2s;}
  .mode.sel{color:var(--yellow);}
  .mode.sel::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--yellow);}
  #dock{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 30px;}
  #thumb{justify-self:start;width:54px;height:54px;border-radius:12px;border:2px solid rgba(255,255,255,.4);background:#1a1c20 center/cover no-repeat;cursor:pointer;overflow:hidden;display:grid;place-items:center;transition:transform .15s;position:relative;}
  #thumb:active{transform:scale(.92);}
  #thumb .empt{color:var(--dim);font-size:10px;}
  #thumb .cnt{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 5px;border-radius:11px;background:var(--yellow);color:#1a1206;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;}
  #thumb .cnt.on{display:flex;}
  #shutter{justify-self:center;width:74px;height:74px;border-radius:50%;border:4px solid #fff;background:transparent;cursor:pointer;display:grid;place-items:center;transition:transform .12s var(--ease-spring);}
  #shutter:active{transform:scale(.92);}
  #shutter .core{width:60px;height:60px;border-radius:50%;background:#fff;transition:width .25s var(--ease-spring),height .25s var(--ease-spring),border-radius .25s var(--ease-spring),background-color .2s;}
  #shutter.video .core{background:var(--red);}
  #shutter.video.rec .core{width:28px;height:28px;border-radius:8px;}
  #flip{justify-self:end;width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(30,30,30,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:var(--txt);display:grid;place-items:center;cursor:pointer;transition:transform .25s var(--ease-spring);}
  #flip:active{transform:scale(.9) rotate(180deg);}
  #flip svg{width:24px;height:24px;}

  #gate{position:absolute;inset:0;z-index:30;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 28px;gap:16px;}
  #gate.hide{display:none;}
  #gate .ic{width:60px;height:60px;border-radius:16px;background:#1c1c1e;border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;color:var(--yellow);}
  #gate .ic svg{width:30px;height:30px;}
  #gate h1{font-size:22px;font-weight:700;}
  #gate p{color:var(--dim);font-size:14px;line-height:1.6;max-width:330px;}
  #gate .err{color:var(--red);font-size:12px;line-height:1.5;max-width:330px;display:none;}
  #gate .err.on{display:block;}
  #start{margin-top:4px;border:none;background:var(--yellow);color:#1a1206;font-family:inherit;font-size:16px;font-weight:700;padding:14px 38px;border-radius:13px;cursor:pointer;transition:transform .15s;}
  #start:active{transform:scale(.96);}

  #gallery{position:absolute;inset:0;z-index:20;background:var(--bg);transform:translateY(100%);transition:transform .34s var(--ease-spring);display:flex;flex-direction:column;}
  #gallery.open{transform:translateY(0);}
  .ghead{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:calc(env(safe-area-inset-top) + 16px) 16px 12px;border-bottom:1px solid rgba(255,255,255,.08);}
  .ghead h2{font-size:17px;font-weight:700;white-space:nowrap;}
  .gbtns{display:flex;gap:7px;flex:1;justify-content:flex-end;}
  .gbtn{border:1px solid rgba(255,255,255,.14);background:#1c1c1e;color:var(--txt);font-family:inherit;font-size:12px;font-weight:600;padding:9px 12px;border-radius:11px;cursor:pointer;white-space:nowrap;}
  .gbtn:active{transform:scale(.95);}
  .gbtn.primary{background:var(--yellow);color:#1a1206;border-color:var(--yellow);}
  .ghint{padding:8px 16px 0;font-size:11px;color:var(--dim);line-height:1.5;}
  #ggrid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start;}
  .gitem{position:relative;aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:#16181c;}
  .gitem img,.gitem video{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .gitem .badge{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:var(--green);display:none;align-items:center;justify-content:center;}
  .gitem.saved .badge{display:flex;}
  .gitem .badge svg{width:12px;height:12px;color:#fff;}
  .gitem .vtag{position:absolute;top:6px;right:6px;display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:8px;background:rgba(0,0,0,.55);font-size:9px;font-weight:700;color:#fff;}
  .gitem .vtag svg{width:9px;height:9px;}
  .gitem .acts{position:absolute;bottom:0;left:0;right:0;display:flex;}
  .gitem .acts button{flex:1;border:none;padding:8px 0;font-size:11px;font-weight:600;font-family:inherit;background:rgba(0,0,0,.62);color:#fff;cursor:pointer;}
  .gitem .acts button.del{color:var(--red);}
  .gempty{grid-column:1/-1;text-align:center;color:var(--dim);padding:50px 20px;font-size:14px;line-height:1.6;}

  #viewer{position:absolute;inset:0;z-index:40;background:#000;display:none;flex-direction:column;}
  #viewer.open{display:flex;}
  .vhead{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;}
  .vhead .vmeta{font-size:12px;color:var(--dim);}
  .vhead .vx{border:none;background:rgba(255,255,255,.12);color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:grid;place-items:center;}
  #vstage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #vimg,#vvid{max-width:100%;max-height:100%;object-fit:contain;display:none;}
  .varrow{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:22px;display:grid;place-items:center;cursor:pointer;}
  #vprev{left:12px;} #vnext{right:12px;}
  .vfoot{display:flex;gap:10px;padding:14px 18px calc(env(safe-area-inset-bottom) + 18px);}
  .vfoot button{flex:1;border:none;font-family:inherit;font-size:15px;font-weight:600;padding:14px 0;border-radius:13px;cursor:pointer;}
  #vsave{background:var(--yellow);color:#1a1206;}
  #vdel{background:#1c1c1e;color:var(--red);border:1px solid rgba(255,59,48,.3);}
</style>
</head>
<body>

<div id="stage">
  <video id="preview" autoplay muted playsinline disablepictureinpicture></video>
  <canvas id="canvas"></canvas>
  <div id="grid"><i class="v1"></i><i class="v2"></i><i class="h1"></i><i class="h2"></i></div>
  <div id="focus"></div>
  <div id="sun">
    <div class="track"></div>
    <div class="knob"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg></div>
  </div>
</div>

<div id="flash"></div>
<div id="recBadge"><span class="pulse"></span><span id="recTime" class="mono">00:00</span></div>
<div id="zoomLive" class="mono">1.0×</div>

<div id="top">
  <div class="readout"><span class="dot"></span><span id="resTxt">--</span></div>
  <div style="display:flex;gap:8px;">
    <button id="gridBtn" style="display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.04em;color:var(--dim);background:rgba(30,30,30,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:7px 11px;cursor:pointer;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="width:15px;height:15px"><path d="M3 3h18v18H3z"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      <span id="gridLabel">격자</span>
    </button>
    <button id="micBtn" class="on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
      <span id="micLabel">소리 켬</span>
    </button>
  </div>
</div>

<div id="zoomBar">
  <button class="zpill" data-z="0.5">.5</button>
  <button class="zpill sel" data-z="1">1×</button>
  <button class="zpill" data-z="2">2</button>
  <button class="zpill" data-z="3">3</button>
</div>

<div id="bottom">
  <div id="modes">
    <div class="mode sel" data-mode="photo">사진</div>
    <div class="mode" data-mode="video">동영상</div>
  </div>
  <div id="dock">
    <div id="thumb"><span class="empt mono">보관함</span><span class="cnt mono" id="thumbCnt">0</span></div>
    <button id="shutter"><span class="core"></span></button>
    <button id="flip" title="카메라 전환">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h3a2 2 0 0 1 2 2v3M9 20H6a2 2 0 0 1-2-2v-3"/><path d="M20 9l-3-3-3 3M4 15l3 3 3-3"/></svg>
    </button>
  </div>
</div>

<div id="gallery">
  <div class="ghead">
    <h2>보관함 <span class="mono" id="galCnt" style="font-size:12px;color:var(--dim)"></span></h2>
    <div class="gbtns">
      <button class="gbtn primary" id="saveAll">모두 저장</button>
      <button class="gbtn" id="cleanup">정리</button>
      <button class="gbtn" id="galClose">닫기</button>
    </div>
  </div>
  <div class="ghint">사진·동영상은 보관함에 모입니다. <b>모두 저장</b>으로 사진첩에 한 번에 저장하세요. ✓ 표시된 저장본은 7일 후 자동 정리됩니다.</div>
  <div id="ggrid"></div>
</div>

<div id="viewer">
  <div class="vhead"><span class="vmeta" id="vmeta"></span><button class="vx" id="vclose">✕</button></div>
  <div id="vstage">
    <button class="varrow" id="vprev">‹</button>
    <img id="vimg" alt="">
    <video id="vvid" controls playsinline></video>
    <button class="varrow" id="vnext">›</button>
  </div>
  <div class="vfoot">
    <button id="vsave">사진첩에 저장</button>
    <button id="vdel">삭제</button>
  </div>
</div>

<div id="gate" class="hide">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h2l1.5-2h7L19 5h0a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.5"/></svg></div>
  <h1>무음 카메라</h1>
  <p>셔터음 없이 사진·동영상을 촬영합니다. 카메라 접근을 허용하면 바로 사용할 수 있어요.</p>
  <div class="err" id="errBox"></div>
  <button id="start">카메라 다시 시도</button>
</div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);

  const stageEl=$("#stage"), videoEl=$("#preview"), canvas=$("#canvas");
  const resTxt=$("#resTxt"), flash=$("#flash");
  const shutter=$("#shutter"), flip=$("#flip"), thumb=$("#thumb"), thumbCnt=$("#thumbCnt");
  const gate=$("#gate"), startBtn=$("#start"), errBox=$("#errBox");
  const gallery=$("#gallery"), ggrid=$("#ggrid"), galCnt=$("#galCnt");
  const viewer=$("#viewer"), vimg=$("#vimg"), vvid=$("#vvid"), vmeta=$("#vmeta");
  const micBtn=$("#micBtn"), recBadge=$("#recBadge"), recTime=$("#recTime");
  const zoomBar=$("#zoomBar"), zoomLive=$("#zoomLive");

  // ---------- 상태 ----------
  let stream=null, videoTrack=null;
  let facing="environment";
  let mode="photo";
  let micOn=true;
  try{ micOn = localStorage.getItem("micOn")!=="0"; }catch(_){}
  const items=[];
  let viewIndex=-1;
  const WEEK=7*24*60*60*1000;

  // 줌
  let zoom=1; const ZMIN=0.5, ZMAX=3;

  // 녹화
  let recorder=null, recChunks=[], recTimer=null, recStart=0, recording=false;
  const MAX_REC_MS=10*60*1000;

  const RES_LADDER=[
    {width:{ideal:4096},height:{ideal:2304}},
    {width:{ideal:3840},height:{ideal:2160}},
    {width:{ideal:1920},height:{ideal:1080}},
    {width:{ideal:1280},height:{ideal:720}},
    {}
  ];
  // 동영상: 4K 한 단계 아래(1080p) + 프레임 최대(60fps 시도)
  const VIDEO_LADDER=[
    {width:{ideal:1920},height:{ideal:1080},frameRate:{ideal:60}},
    {width:{ideal:1920},height:{ideal:1080}},
    {width:{ideal:1280},height:{ideal:720},frameRate:{ideal:60}},
    {width:{ideal:1280},height:{ideal:720}},
    {}
  ];

  // ---------- IndexedDB ----------
  let _db=null;
  function openDB(){
    if(_db) return Promise.resolve(_db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open("silentcam",2);
      r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("photos")) r.result.createObjectStore("photos",{keyPath:"id"}); };
      r.onsuccess=()=>{ _db=r.result; res(_db); };
      r.onerror=()=>rej(r.error);
    });
  }
  function txDone(tx){ return new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=()=>rej(tx.error); tx.onabort=()=>rej(tx.error); }); }
  function reqProm(req){ return new Promise((res,rej)=>{ req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
  function getAll(db){ return new Promise((res,rej)=>{ const out=[]; const req=db.transaction("photos").objectStore("photos").openCursor(); req.onsuccess=e=>{const c=e.target.result; if(c){out.push(c.value);c.continue();}else res(out);}; req.onerror=()=>rej(req.error); }); }
  async function dbPut(rec){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").put(rec); await txDone(tx); }
  async function dbDelete(id){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); tx.objectStore("photos").delete(id); await txDone(tx); }
  async function dbMarkSaved(id,savedAt){ const db=await openDB(); const tx=db.transaction("photos","readwrite"); const st=tx.objectStore("photos"); const rec=await reqProm(st.get(id)); if(rec){rec.saved=true;rec.savedAt=savedAt;st.put(rec);} await txDone(tx); }

  // ---------- 카메라 ----------
  // 해상도 사다리로 스트림 확보 (옛 스트림은 건드리지 않음)
  async function getStream(withAudio){
    let lastErr=null;
    const ladder = (mode==="video") ? VIDEO_LADDER : RES_LADDER;
    for(const res of ladder){
      try{
        return await navigator.mediaDevices.getUserMedia({audio:withAudio?true:false,video:{facingMode:{ideal:facing},...res}});
      }catch(e){
        lastErr=e;
        if(withAudio && (e.name==="NotAllowedError"||e.name==="NotFoundError")){
          try{ return await navigator.mediaDevices.getUserMedia({audio:false,video:{facingMode:{ideal:facing},...res}}); }catch(_){}
        }
        if(e.name==="NotAllowedError"||e.name==="NotFoundError") throw e;
      }
    }
    throw lastErr||new Error("unknown");
  }
  // 새 스트림을 먼저 얻고 → 성공 시에만 옛 스트림 정리 (권한 재요청·검은 깜빡임 최소화)
  async function acquireCamera({withAudio=false}={}){
    const newStream = await getStream(withAudio);
    const old = stream;
    stream = newStream; videoTrack = newStream.getVideoTracks()[0];
    attachPreview(newStream); updateRes();
    if(old){ try{ old.getTracks().forEach(t=>t.stop()); }catch(_){} }
    return newStream;
  }
  async function teardownStream(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); }
    if(videoEl){ try{videoEl.pause();}catch(_){} videoEl.srcObject=null; }
    stream=null; videoTrack=null;
  }
  function attachPreview(s){
    videoEl.srcObject=s; videoEl.muted=true; videoEl.playsInline=true;
    applyPreviewTransform();
    videoEl.play().catch(()=>{});
  }
  function updateRes(){
    const set=videoTrack&&videoTrack.getSettings?videoTrack.getSettings():{};
    const w=set.width||videoEl.videoWidth, h=set.height||videoEl.videoHeight;
    const lens=facing==="user"?"전면":"후면";
    resTxt.textContent=(w&&h)?`${lens} · ${w}×${h}`:lens;
  }

  // ---------- 줌 ----------
  function applyPreviewTransform(){
    const sign = (facing==="user") ? -1 : 1;
    // 웹은 실제 광각이 없어 1x보다 넓게 못 감 → 프리뷰는 최소 1배(풀프레임)
    const visual = Math.max(1, zoom);
    videoEl.style.transform = `scale(${visual*sign}, ${visual})`;
    videoEl.style.transformOrigin = "center center";
  }
  function setZoom(z, live){
    zoom = Math.max(ZMIN, Math.min(ZMAX, z));
    applyPreviewTransform();
    // 버튼 하이라이트: 가장 가까운 프리셋
    document.querySelectorAll(".zpill").forEach(p=>{
      p.classList.toggle("sel", Math.abs(parseFloat(p.dataset.z)-zoom)<0.01);
    });
    if(live){ zoomLive.textContent=`${zoom.toFixed(1)}×`; zoomLive.classList.add("on"); clearTimeout(setZoom._t); setZoom._t=setTimeout(()=>zoomLive.classList.remove("on"),900); }
  }
  function resetZoom(){ setZoom(1,false); }

  // ---------- 제스처: 핀치(줌) + 탭(포커스) ----------
  const focusEl=$("#focus"), sunEl=$("#sun");
  let ev=0;  // 노출 -1..+1
  const FILTER_SUPPORTED=(()=>{ try{ const c=document.createElement("canvas").getContext("2d"); c.filter="brightness(1.5)"; return c.filter==="brightness(1.5)"; }catch(_){ return false; } })();

  function applyExposurePreview(){
    const b=(1+ev*0.5).toFixed(3), c=(1+ev*0.12).toFixed(3);
    videoEl.style.setProperty("--ev-b", b);
    videoEl.style.setProperty("--ev-c", c);
  }

  const ptrs=new Map(); let pinchStartDist=0, pinchStartZoom=1;
  let downT=0, downX=0, downY=0, moved=false, wasPinch=false;
  let sunHideT=null;

  stageEl.addEventListener("pointerdown",e=>{
    if(e.target.closest("#sun")) return;            // 태양 슬라이더는 별도 처리
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1){ downT=e.timeStamp; downX=e.clientX; downY=e.clientY; moved=false; wasPinch=false; }
    if(ptrs.size===2 && mode==="photo"){ wasPinch=true; const[a,b]=[...ptrs.values()]; pinchStartDist=Math.hypot(a.x-b.x,a.y-b.y); pinchStartZoom=zoom; }
  });
  stageEl.addEventListener("pointermove",e=>{
    if(!ptrs.has(e.pointerId)) return;
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1){ if(Math.hypot(e.clientX-downX,e.clientY-downY)>10) moved=true; }
    if(ptrs.size===2 && mode==="photo" && pinchStartDist>0){
      const[a,b]=[...ptrs.values()]; const d=Math.hypot(a.x-b.x,a.y-b.y);
      setZoom(pinchStartZoom*(d/pinchStartDist), true);
    }
  });
  function onPtrUp(e){
    const wasSingle=ptrs.size===1;
    ptrs.delete(e.pointerId);
    if(ptrs.size<2) pinchStartDist=0;
    // 단일 빠른 탭(이동 적음, 핀치 아님) → 포커스
    if(wasSingle && !wasPinch && !moved && (e.timeStamp-downT)<300){
      focusTap(e.clientX, e.clientY);
    }
    if(ptrs.size===0) wasPinch=false;
  }
  stageEl.addEventListener("pointerup",onPtrUp);
  stageEl.addEventListener("pointercancel",e=>{ ptrs.delete(e.pointerId); if(ptrs.size<2) pinchStartDist=0; });

  function focusTap(clientX, clientY){
    const r=stageEl.getBoundingClientRect();
    const x=clientX-r.left, y=clientY-r.top;
    focusEl.style.left=x+"px"; focusEl.style.top=y+"px";
    focusEl.classList.remove("show","fade"); void focusEl.offsetWidth; focusEl.classList.add("show");
    // 노출 슬라이더 배치(사각형 오른쪽), 화면 밖이면 왼쪽
    let sxp=x+50; if(sxp>r.width-44) sxp=x-50-36;
    sunEl.style.left=sxp+"px"; sunEl.style.top=y+"px";
    positionKnob();
    sunEl.classList.add("show");
    armSunHide();
    setTimeout(()=>focusEl.classList.add("fade"),700);
  }
  function armSunHide(){ clearTimeout(sunHideT); sunHideT=setTimeout(()=>{ sunEl.classList.remove("show"); },4000); }

  // 태양 노브 드래그 → 노출
  const knob=sunEl.querySelector(".knob"); const SUN_H=150, SUN_PAD=14, RANGE=SUN_H-2*SUN_PAD;
  function positionKnob(){ const t=SUN_PAD + (1-(ev+1)/2)*RANGE; knob.style.top=(t-15)+"px"; }
  let sunDragging=false;
  knob.addEventListener("pointerdown",e=>{ e.stopPropagation(); sunDragging=true; knob.setPointerCapture(e.pointerId); knob.style.cursor="grabbing"; clearTimeout(sunHideT); });
  knob.addEventListener("pointermove",e=>{
    if(!sunDragging) return; e.stopPropagation();
    const rect=sunEl.getBoundingClientRect();
    let py=e.clientY-rect.top-SUN_PAD; py=Math.max(0,Math.min(RANGE,py));
    ev = ( (1-py/RANGE)*2 -1 );           // 위=+1, 아래=-1
    ev=Math.max(-1,Math.min(1,ev));
    positionKnob(); applyExposurePreview();
  });
  knob.addEventListener("pointerup",e=>{ e.stopPropagation(); sunDragging=false; knob.style.cursor="grab"; armSunHide(); });

  zoomBar.addEventListener("click",e=>{
    const p=e.target.closest(".zpill"); if(!p) return;
    setZoom(parseFloat(p.dataset.z), true);
  });

  function updateZoomUI(){
    if(mode==="video"){ zoomBar.classList.add("hide"); resetZoom(); }
    else { zoomBar.classList.remove("hide"); }
  }

  // ---------- 격자 ----------
  const gridEl=$("#grid"), gridBtn=$("#gridBtn");
  let gridOn=false; try{ gridOn=localStorage.getItem("gridOn")==="1"; }catch(_){}
  function renderGrid(){ gridEl.classList.toggle("on",gridOn); gridBtn.classList.toggle("on",gridOn); }
  gridBtn.addEventListener("click",()=>{ gridOn=!gridOn; try{localStorage.setItem("gridOn",gridOn?"1":"0");}catch(_){} renderGrid(); });

  function stamp(ts){ const d=new Date(ts||Date.now()),p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`; }

  // ---------- 보관함 추가 ----------
  async function addMedia(blob,kind,ext){
    const ts=Date.now();
    const id=ts+"_"+Math.random().toString(36).slice(2,6);
    const url=URL.createObjectURL(blob);
    const prefix=kind==="video"?"VID":"IMG";
    const file=new File([blob], `${prefix}_${stamp(ts)}.${ext}`, {type:blob.type});
    items.unshift({id,url,file,ts,kind,ext,saved:false,savedAt:0});
    refreshThumb();
    if(gallery.classList.contains("open")) renderGallery();
    try{ const buf=await blob.arrayBuffer(); await dbPut({id,ts,kind,ext,type:blob.type,bytes:buf,saved:false,savedAt:0}); }
    catch(e){ console.warn("저장 실패(메모리 유지):",e); }
  }

  // ---------- 사진 (줌 크롭 반영) ----------
  // ===== 연구3 화질 보정 파이프라인 (사진 후처리, 적당 강도) =====
  const ENH = {
    shadowLift: 0.22,   // 섀도우/미드 올리기
    highComp:   0.10,   // 하이라이트 누르기
    sat:        1.12,   // 채도
    warmR:      1.030,  // 따뜻한 화이트밸런스
    warmB:      0.972,
    noiseThr:   10,     // 이 이하 차이는 노이즈로 간주(0~255)
    denoise:    0.55,   // 평탄부 평활 강도
    sharpen:    0.70    // 엣지 선명도
  };
  // 1) 점연산: 톤매핑 + 색감(채도/온도)
  function tonalColorPass(d){
    const {shadowLift:SL, highComp:HC, sat:SAT, warmR, warmB}=ENH;
    for(let i=0;i<d.length;i+=4){
      let r=d[i]/255, g=d[i+1]/255, b=d[i+2]/255;
      // 톤매핑(채널별 게인 곡선)
      r = r + SL*(1-r)*r - HC*r*r;
      g = g + SL*(1-g)*g - HC*g*g;
      b = b + SL*(1-b)*b - HC*b*b;
      // 화이트밸런스(따뜻하게)
      r*=warmR; b*=warmB;
      // 채도(루마 기준)
      const lum = 0.299*r + 0.587*g + 0.114*b;
      r = lum + SAT*(r-lum);
      g = lum + SAT*(g-lum);
      b = lum + SAT*(b-lum);
      d[i]  = r<=0?0:r>=1?255:r*255;
      d[i+1]= g<=0?0:g>=1?255:g*255;
      d[i+2]= b<=0?0:b>=1?255:b*255;
    }
  }
  // 2) 이웃연산 1패스: 엣지보존 디노이즈 + 언샵(평탄부=평활, 엣지=선명)
  function denoiseSharpenPass(s,o,w,h){
    const {noiseThr:THR, denoise:DEN, sharpen:SH}=ENH;
    for(let y=0;y<h;y++){
      const y0=y>0?y-1:0, y1=y<h-1?y+1:h-1;
      const r0=y0*w*4, r1=y*w*4, r2=y1*w*4;
      for(let x=0;x<w;x++){
        const x0=(x>0?x-1:0)*4, xc=x*4, x1=(x<w-1?x+1:w-1)*4;
        const i=(y*w+x)*4;
        for(let c=0;c<3;c++){
          const mean=(
            s[r0+x0+c]+s[r0+xc+c]+s[r0+x1+c]+
            s[r1+x0+c]+s[r1+xc+c]+s[r1+x1+c]+
            s[r2+x0+c]+s[r2+xc+c]+s[r2+x1+c]
          )/9;
          const px=s[i+c], diff=px-mean;
          const base = (Math.abs(diff)<THR) ? (px - diff*DEN) : px;  // 평탄부만 평활
          let v = base + SH*(base-mean);                            // 엣지 선명
          o[i+c]=v<0?0:v>255?255:v;
        }
        o[i+3]=s[i+3];
      }
    }
  }
  function enhancePhoto(ctx,w,h){
    try{
      const img=ctx.getImageData(0,0,w,h); const s=img.data;
      tonalColorPass(s);                       // 톤+색감(제자리)
      const out=ctx.createImageData(w,h);
      denoiseSharpenPass(s,out.data,w,h);      // 디노이즈+언샵
      ctx.putImageData(out,0,0);
    }catch(_){}
  }
  function applyExposureCanvas(ctx,w,h,b,c){
    try{
      const id=ctx.getImageData(0,0,w,h); const d=id.data;
      for(let i=0;i<d.length;i+=4){
        for(let k=0;k<3;k++){ let v=d[i+k]/255; v=(v-0.5)*c+0.5; v*=b; d[i+k]=v<=0?0:v>=1?255:v*255; }
      }
      ctx.putImageData(id,0,0);
    }catch(_){}
  }
  function takePhoto(){
    const vw=videoEl.videoWidth, vh=videoEl.videoHeight;
    if(!vw||!vh) return;
    const z=Math.max(1, zoom);          // 1x 미만은 크롭 안 함(원본)
    const sw=vw/z, sh=vh/z;
    const sx=(vw-sw)/2, sy=(vh-sh)/2;   // 중앙 크롭
    canvas.width=Math.round(sw); canvas.height=Math.round(sh);
    const ctx=canvas.getContext("2d");
    const b=1+ev*0.5, c=1+ev*0.12;
    if(ev!==0 && FILTER_SUPPORTED) ctx.filter=`brightness(${b}) contrast(${c})`;
    if(facing==="user"){ ctx.translate(canvas.width,0); ctx.scale(-1,1); }
    ctx.drawImage(videoEl, sx,sy,sw,sh, 0,0,canvas.width,canvas.height);
    ctx.filter="none";
    flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");
    const cw=canvas.width, ch=canvas.height, needEV=(ev!==0 && !FILTER_SUPPORTED);
    setTimeout(()=>{                                   // 플래시 먼저 → 무거운 후처리는 다음 틱
      if(needEV) applyExposureCanvas(ctx,cw,ch,b,c);   // 노출 슬라이더(필터 미지원 시)
      enhancePhoto(ctx,cw,ch);                          // 연구3 보정 파이프라인
      canvas.toBlob(b2=>{ if(b2) addMedia(b2,"photo","jpg"); }, "image/jpeg", 1.0);
    },0);
  }

  // ---------- 동영상 (항상 1x 원본) ----------
  function pickMime(){
    const c=["video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/mp4","video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm"];
    for(const m of c){ if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) return m; }
    return "";
  }
  function startRec(){
    if(!stream||recording) return;
    if(!window.MediaRecorder){ alert("이 브라우저는 동영상 녹화를 지원하지 않습니다."); return; }
    const mime=pickMime();
    try{ recorder = mime ? new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:16000000,audioBitsPerSecond:128000}) : new MediaRecorder(stream); }
    catch(e){ try{ recorder=new MediaRecorder(stream);}catch(e2){ alert("녹화를 시작할 수 없습니다."); return; } }
    recChunks=[];
    recorder.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
    recorder.onstop=()=>{
      const type=recorder.mimeType||mime||"video/mp4";
      const ext=type.indexOf("mp4")>=0?"mp4":"webm";
      const blob=new Blob(recChunks,{type}); recChunks=[];
      if(blob.size) addMedia(blob,"video",ext);
    };
    recorder.start(1000); recording=true;
    shutter.classList.add("rec");
    recStart=Date.now(); recBadge.classList.add("on"); tickRec();
    recTimer=setInterval(()=>{ tickRec(); if(Date.now()-recStart>=MAX_REC_MS) stopRec(); },250);
  }
  function tickRec(){ const s=Math.floor((Date.now()-recStart)/1000); recTime.textContent=`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }
  function stopRec(){
    if(!recording) return; recording=false;
    try{ recorder.stop(); }catch(_){}
    clearInterval(recTimer); shutter.classList.remove("rec"); recBadge.classList.remove("on");
  }

  function onShutter(){
    if(!stream) return;
    if(mode==="photo") takePhoto();
    else recording ? stopRec() : startRec();
  }

  // ---------- 모드/전후면 ----------
  let busy=false;
  async function setMode(m){
    if(busy||recording||m===mode) return; busy=true;
    mode=m;
    document.querySelectorAll(".mode").forEach(x=>x.classList.toggle("sel",x.dataset.mode===m));
    shutter.classList.toggle("video",m==="video");
    resetZoom(); updateZoomUI();
    try{ await acquireCamera({withAudio:m==="video"&&micOn}); }catch(e){ showError(e); }
    finally{ busy=false; }
  }
  async function switchCamera(){
    if(busy||recording) return; busy=true;
    facing=(facing==="environment")?"user":"environment";
    resetZoom();
    try{ await acquireCamera({withAudio:mode==="video"&&micOn}); }catch(e){ showError(e); }
    finally{ busy=false; }
  }

  // ---------- 마이크 ----------
  function renderMic(){ micBtn.classList.toggle("on",micOn); $("#micLabel").textContent=micOn?"소리 켬":"소리 끔"; }
  micBtn.addEventListener("click",async()=>{
    if(recording) return;
    micOn=!micOn; try{ localStorage.setItem("micOn",micOn?"1":"0"); }catch(_){}
    renderMic();
    if(mode==="video"){ busy=true; try{ await acquireCamera({withAudio:micOn}); }catch(e){ showError(e); } finally{ busy=false; } }
  });

  // ---------- 저장/공유 ----------
  function downloadFallback(it){ const a=document.createElement("a"); a.href=it.url; a.download=it.file.name; document.body.appendChild(a); a.click(); a.remove(); }
  async function markSaved(list){ const now=Date.now(); for(const it of list){ it.saved=true; it.savedAt=now; try{ await dbMarkSaved(it.id,now);}catch(_){} } }
  function saveOne(it){
    if(navigator.canShare && navigator.canShare({files:[it.file]})){
      navigator.share({files:[it.file]}).then(async()=>{ await markSaved([it]); renderGallery(); refreshViewerState(); }).catch(()=>{});
    }else{ downloadFallback(it); }
  }
  function saveAll(){
    let list=items.filter(it=>!it.saved); if(!list.length) list=items.slice();
    if(!list.length) return;
    const files=list.map(it=>it.file);
    if(navigator.canShare && navigator.canShare({files})){
      navigator.share({files}).then(async()=>{ await markSaved(list); renderGallery(); }).catch(err=>{ if(err&&err.name!=="AbortError") alert("한 번에 저장이 안 되면 개수를 줄이거나 한 개씩 저장해 주세요. (동영상은 따로 저장 권장)"); });
    }else{ list.forEach(downloadFallback); }
  }

  // ---------- 삭제/정리 ----------
  async function deleteItem(id){
    const i=items.findIndex(x=>x.id===id);
    if(i>=0){ URL.revokeObjectURL(items[i].url); items.splice(i,1); }
    refreshThumb(); renderGallery();
    try{ await dbDelete(id); }catch(_){}
  }
  async function cleanupSaved(manual){
    const now=Date.now();
    const targets=items.filter(it=>it.saved&&it.savedAt&&(now-it.savedAt)>WEEK);
    if(manual&&!targets.length){ alert("정리할 7일 지난 저장본이 없습니다."); return; }
    for(const it of targets){ URL.revokeObjectURL(it.url); const i=items.indexOf(it); if(i>=0) items.splice(i,1); try{await dbDelete(it.id);}catch(_){} }
    refreshThumb(); renderGallery();
    if(manual) alert(`${targets.length}개 정리했습니다.`);
  }

  // ---------- 갤러리 ----------
  function refreshThumb(){
    thumbCnt.textContent=items.length; thumbCnt.classList.toggle("on",items.length>0);
    const empt=thumb.querySelector(".empt");
    if(items.length){ empt.style.display="none"; if(items[0].kind==="photo"){ thumb.style.backgroundImage=`url(${items[0].url})`; thumb.style.background=""; } else { thumb.style.backgroundImage="none"; thumb.style.background="#2a2c30"; } }
    else { empt.style.display="block"; thumb.style.backgroundImage="none"; thumb.style.background="#1a1c20"; }
  }
  function renderGallery(){
    galCnt.textContent=items.length?`(${items.length})`:"";
    if(!items.length){ ggrid.innerHTML='<div class="gempty">아직 촬영한 사진·동영상이 없습니다.</div>'; return; }
    ggrid.innerHTML="";
    items.forEach((it,idx)=>{
      const el=document.createElement("div"); el.className="gitem"+(it.saved?" saved":"");
      const media=it.kind==="photo"?`<img src="${it.url}" data-idx="${idx}" alt="">`:`<video src="${it.url}" data-idx="${idx}" muted playsinline preload="metadata"></video>`;
      const vtag=it.kind==="video"?`<span class="vtag"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>VIDEO</span>`:"";
      el.innerHTML=`<span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></span>${vtag}${media}<div class="acts"><button data-act="save" data-id="${it.id}">저장</button><button class="del" data-act="del" data-id="${it.id}">삭제</button></div>`;
      ggrid.appendChild(el);
    });
  }
  ggrid.addEventListener("click",e=>{
    const m=e.target.closest("[data-idx]");
    if(m){ openViewer(parseInt(m.dataset.idx,10)); return; }
    const b=e.target.closest("button[data-act]"); if(!b) return;
    const it=items.find(x=>x.id===b.dataset.id); if(!it) return;
    if(b.dataset.act==="save") saveOne(it);
    else if(b.dataset.act==="del"){ if(confirm("삭제할까요?")) deleteItem(it.id); }
  });

  // ---------- 뷰어 ----------
  function openViewer(idx){ if(idx<0||idx>=items.length) return; viewIndex=idx; renderViewer(); viewer.classList.add("open"); }
  function renderViewer(){
    const it=items[viewIndex]; if(!it){ closeViewer(); return; }
    try{ vvid.pause(); }catch(_){}
    if(it.kind==="photo"){ vimg.src=it.url; vimg.style.display="block"; vvid.style.display="none"; vvid.removeAttribute("src"); }
    else { vvid.src=it.url; vvid.style.display="block"; vimg.style.display="none"; vimg.removeAttribute("src"); }
    vmeta.textContent=`${viewIndex+1} / ${items.length} · ${it.kind==="video"?"동영상":"사진"}${it.saved?" · 저장됨 ✓":""}`;
  }
  function refreshViewerState(){ if(viewer.classList.contains("open")) renderViewer(); }
  function closeViewer(){ try{vvid.pause();}catch(_){} viewer.classList.remove("open"); viewIndex=-1; }
  $("#vclose").addEventListener("click",closeViewer);
  $("#vprev").addEventListener("click",()=>{ if(viewIndex>0){ viewIndex--; renderViewer(); } });
  $("#vnext").addEventListener("click",()=>{ if(viewIndex<items.length-1){ viewIndex++; renderViewer(); } });
  $("#vsave").addEventListener("click",()=>{ const it=items[viewIndex]; if(it) saveOne(it); });
  $("#vdel").addEventListener("click",async()=>{
    const it=items[viewIndex]; if(!it) return;
    if(!confirm("삭제할까요?")) return;
    await deleteItem(it.id);
    if(!items.length){ closeViewer(); return; }
    if(viewIndex>=items.length) viewIndex=items.length-1;
    renderViewer();
  });
  let sx=0;
  $("#vstage").addEventListener("touchstart",e=>{ sx=e.touches[0].clientX; },{passive:true});
  $("#vstage").addEventListener("touchend",e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(dx>50&&viewIndex>0){ viewIndex--; renderViewer(); }
    else if(dx<-50&&viewIndex<items.length-1){ viewIndex++; renderViewer(); }
  },{passive:true});

  // ---------- 로드 ----------
  async function loadGallery(){
    try{
      const db=await openDB(); const recs=await getAll(db); const now=Date.now();
      recs.sort((a,b)=>b.ts-a.ts);
      for(const r of recs){
        if(r.saved&&r.savedAt&&(now-r.savedAt)>WEEK){ try{await dbDelete(r.id);}catch(_){} continue; }
        const kind=r.kind||"photo"; const ext=r.ext||(kind==="video"?"mp4":"jpg");
        const blob=new Blob([r.bytes],{type:r.type||(kind==="video"?"video/mp4":"image/jpeg")});
        const url=URL.createObjectURL(blob);
        const prefix=kind==="video"?"VID":"IMG";
        const file=new File([blob], `${prefix}_${stamp(r.ts)}.${ext}`, {type:blob.type});
        items.push({id:r.id,url,file,ts:r.ts,kind,ext,saved:!!r.saved,savedAt:r.savedAt||0});
      }
      refreshThumb();
    }catch(e){ console.warn("보관함 로드 실패:",e); }
  }

  // ---------- 이벤트 ----------
  shutter.addEventListener("click",onShutter);
  flip.addEventListener("click",switchCamera);
  document.querySelectorAll(".mode").forEach(m=>m.addEventListener("click",()=>setMode(m.dataset.mode)));
  thumb.addEventListener("click",()=>{ renderGallery(); gallery.classList.add("open"); });
  $("#galClose").addEventListener("click",()=>gallery.classList.remove("open"));
  $("#saveAll").addEventListener("click",saveAll);
  $("#cleanup").addEventListener("click",()=>cleanupSaved(true));

  // ---------- 에러 ----------
  function showError(e){
    let m="카메라를 열 수 없습니다.";
    if(e){
      if(e.name==="NotAllowedError") m="카메라 권한이 거부되었습니다. 브라우저 설정에서 허용해 주세요.";
      else if(e.name==="NotFoundError") m="사용 가능한 카메라를 찾지 못했습니다.";
      else if(e.name==="NotReadableError") m="다른 앱이 카메라를 사용 중입니다.";
      else if(location.protocol!=="https:" && location.hostname!=="localhost") m="HTTPS 환경에서만 카메라를 사용할 수 있습니다.";
      else m+=" ("+(e.name||e.message||"unknown")+")";
    }
    errBox.textContent=m; errBox.classList.add("on"); gate.classList.remove("hide");
  }

  // ---------- 라이프사이클 ----------
  document.addEventListener("visibilitychange",async()=>{
    if(document.hidden){ if(recording) stopRec(); return; }   // 숨김 시 스트림 유지(녹화만 정지)
    if(!gate.classList.contains("hide")) return;
    // 복귀: 트랙이 살아있으면 재생만 재개, 끊겼을 때만 재획득
    if(videoTrack && videoTrack.readyState==="live"){ videoEl.play().catch(()=>{}); return; }
    try{ await acquireCamera({withAudio:mode==="video"&&micOn}); }catch(e){ showError(e); }
  });
  window.addEventListener("pageshow",async(ev)=>{ if(ev.persisted && gate.classList.contains("hide")){ try{ await acquireCamera({withAudio:mode==="video"&&micOn}); }catch(e){ showError(e); } } });
  window.addEventListener("pagehide",()=>{ if(recording) stopRec(); if(stream) stream.getTracks().forEach(t=>t.stop()); });

  // ---------- 부트 ----------
  async function boot(){
    errBox.classList.remove("on"); renderMic(); updateZoomUI(); renderGrid(); applyExposurePreview();
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      errBox.textContent="이 브라우저는 카메라 API를 지원하지 않습니다."; errBox.classList.add("on"); gate.classList.remove("hide"); return;
    }
    try{ await acquireCamera({withAudio:false}); gate.classList.add("hide"); loadGallery(); }
    catch(e){ showError(e); }
  }
  startBtn.addEventListener("click",boot);
  boot();
})();
</script>
</body>
</html>
